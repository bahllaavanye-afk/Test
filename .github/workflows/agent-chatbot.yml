name: Agent Chatbot — Reply via Slack (works without Claude)

on:
  workflow_dispatch:
    inputs:
      agent:
        description: "Agent name to chat with"
        required: true
        default: "free_agent_engineer"
      message:
        description: "Message to send to the agent"
        required: true
      channel:
        description: "Slack channel to post reply to (default: general)"
        required: false
        default: "general"

jobs:
  chat:
    name: Chat with ${{ github.event.inputs.agent }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install --quiet requests

      - name: Run agent chat
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY_1 }}
          GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY_1 }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY_1 }}
          DEEPSEEK_API_KEY_2: ${{ secrets.DEEPSEEK_API_KEY_2 }}
          DEEPSEEK_API_KEY_3: ${{ secrets.DEEPSEEK_API_KEY_3 }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_API_KEY_2: ${{ secrets.OPENROUTER_API_KEY_2 }}
          SLACK_BOT_TOKEN:  ${{ secrets.SLACK_BOT_TOKEN }}
          AGENT_NAME:       ${{ github.event.inputs.agent }}
          USER_MESSAGE:     ${{ github.event.inputs.message }}
          SLACK_CHANNEL:    ${{ github.event.inputs.channel }}
          ALLOW_PAID_APIS:  "False"
        run: python .github/scripts/agent_chat_handler.py

      - name: Push updated memory
        continue-on-error: true
        run: |
          git config user.email "agent-chatbot@quantedge.ai"
          git config user.name "QuantEdge Agent Chatbot"
          git add .github/state/agent_memory.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chat: agent conversation logged $(date -u +%H:%M)"
          for i in 1 2 3 4; do
            git pull --rebase --quiet origin claude/advanced-trading-bot-d5Lmw && break || sleep $((i*2))
          done
          git push -u origin claude/advanced-trading-bot-d5Lmw || true
