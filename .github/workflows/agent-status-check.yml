name: Agent Status Check — Every 4 Hours

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  status-check:
    name: Roll call — all 18 agents report in
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install --quiet requests

      - name: Configure git
        run: |
          git config user.email "status@quantedge.ai"
          git config user.name "QuantEdge Status Bot"

      - name: Run agent status check
        env:
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY_1 }}
          DEEPSEEK_API_KEY:     ${{ secrets.DEEPSEEK_API_KEY_1 }}
          DEEPSEEK_API_KEY_2:   ${{ secrets.DEEPSEEK_API_KEY_2 }}
          DEEPSEEK_API_KEY_3:   ${{ secrets.DEEPSEEK_API_KEY_3 }}
          SAMBANOVA_API_KEY:    ${{ secrets.SAMBANOVA_API_KEY_1 }}
          CEREBRAS_API_KEY:     ${{ secrets.CEREBRAS_API_KEY_1 }}
          HYPERBOLIC_API_KEY:   ${{ secrets.HYPERBOLIC_API_KEY_1 }}
          NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
          NVIDIA_AGENTS_API_KEYS: ${{ secrets.NVIDIA_AGENTS_API_KEYS }}
          TOGETHER_API_KEY:     ${{ secrets.TOGETHER_API_KEY_1 }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY_1 }}
          SLACK_BOT_TOKEN:      ${{ secrets.SLACK_BOT_TOKEN }}
          ALLOW_PAID_APIS:      "False"
        run: python .github/scripts/agent_status_checker.py

      - name: Commit updated state
        continue-on-error: true
        run: |
          git add .github/state/agent_memory.json .github/state/agent_status.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "status: agent roll call $(date -u +%H:%M)"

      - name: Push
        continue-on-error: true
        run: |
          for i in 1 2 3 4; do
            git pull --rebase --quiet origin claude/advanced-trading-bot-d5Lmw && break || sleep $((i*2))
          done
          git push -u origin claude/advanced-trading-bot-d5Lmw || true

      - name: Summary
        if: always()
        run: |
          echo "## Agent Status Check — $(date -u)" >> "$GITHUB_STEP_SUMMARY"
          python3 -c "
          import json, pathlib
          try:
              s = json.loads(pathlib.Path('.github/state/agent_status.json').read_text())
              print(f'- Total agents: {s[\"total_agents\"]}')
              print(f'- Batch checked: {s[\"batch_checked\"]}')
              print(f'- Total runs across all agents: {s[\"total_runs\"]}')
              print(f'- Platform success rate: {s[\"success_rate_pct\"]}%')
              print(f'- Shared skills: {s[\"skill_count\"]}')
              print()
              print('### Agent Reports')
              for a in s.get('agent_statuses', []):
                  print(f'- {a[\"emoji\"]} **{a[\"agent\"]}**: {a[\"reply\"][:100]}')
          except Exception as e:
              print(f'Could not parse status: {e}')
          " >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
