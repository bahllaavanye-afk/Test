name: QuantEdge AI Slack Bot

# Posts proactive AI insights 4x/day to all desks.
# Every employee can trigger insights by running this workflow manually
# (eventually wire to Slack Events API for real-time @mention support).

on:
  schedule:
    - cron: "0 * * * *"   # 4x daily (9am, 1pm, 5pm, 9pm UTC)
  push:
    branches:
      - claude/advanced-trading-bot-d5Lmw
      - main
    paths:
      - ".github/scripts/ai_slack_bot.py"
      - ".github/workflows/ai-slack-bot.yml"
  workflow_dispatch:
    inputs:
      channel:
        description: "Slack channel to post to (leave empty for all)"
        required: false
        default: ""

concurrency:
  group: ai-slack-bot
  cancel-in-progress: true

jobs:
  insights:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/advanced-trading-bot-d5Lmw

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install anthropic httpx

      - name: Post AI insights to Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          ANTHROPIC_API_KEY: "disabled"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          if [ -z "$SLACK_BOT_TOKEN" ]; then
            echo "::warning::SLACK_BOT_TOKEN not set — Slack notifications skipped (add to repo Secrets to enable)"
            exit 0
          fi
          if [ -z "$ANTHROPIC_API_KEY" ] || [ "$ANTHROPIC_API_KEY" = "disabled" ]; then
            echo "::warning::ANTHROPIC_API_KEY disabled — AI insights skipped (add to repo Secrets to enable)"
            exit 0
          fi
          python .github/scripts/ai_slack_bot.py proactive
