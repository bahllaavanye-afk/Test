name: Autonomous Strategy Generator

on:
  schedule:
    # Run daily — proposes and commits new strategies every day at 05:00 UTC
    - cron: "0 */3 * * *"
  workflow_dispatch:
    inputs:
      market_type:
        description: "Market type to generate strategy for"
        default: "auto"
        type: choice
        options: [auto, equity, crypto, polymarket]
      n_strategies:
        description: "Number of strategies to generate (1-3)"
        default: "1"

concurrency:
  group: strategy-generator
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  generate:
    name: Generate & Commit New Strategies
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/advanced-trading-bot-d5Lmw
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install uv --quiet
          uv pip install --system \
            'google-generativeai>=0.8.0' \
            'anthropic>=0.40.0' \
            'pandas>=2.2.0' 'numpy>=1.26.0' \
            'pydantic>=2.10.0' 'pyyaml>=6.0' \
            'structlog>=24.4.0'

      - name: Generate new strategies via Gemini + Claude
        id: generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_1 }}
          ANTHROPIC_API_KEY: "disabled"
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          HYPERBOLIC_API_KEY: ${{ secrets.HYPERBOLIC_API_KEY }}
          MARKET_TYPE: ${{ github.event.inputs.market_type || 'auto' }}
          N_STRATEGIES: ${{ github.event.inputs.n_strategies || '1' }}
        run: python .github/scripts/strategy_generator.py

      - name: Run tests on new strategies
        working-directory: backend
        env:
          PYTHONPATH: "."
          SECRET_KEY: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2"
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"
          ALEMBIC_DATABASE_URL: "sqlite:///./test.db"
          REDIS_URL: ""
          TRADING_MODE: "test"
          ALPACA_API_KEY: "test"
          ALPACA_SECRET_KEY: "test"
          ALPACA_BASE_URL: "https://paper-api.alpaca.markets"
        run: |
          uv pip install --system \
            'fastapi>=0.115.0' 'sqlalchemy[asyncio]>=2.0.36' 'aiosqlite>=0.19.0' \
            'pydantic[email]>=2.10.0' 'pydantic-settings>=2.6.0' 'email-validator>=2.0.0' \
            'python-jose[cryptography]>=3.3.0' 'passlib[bcrypt]>=1.7.4' \
            'cryptography>=43.0.0' 'bcrypt==4.0.1' \
            'numpy>=1.26.0' 'pandas>=2.2.0' 'scipy>=1.14.0' \
            'scikit-learn>=1.5.0' 'statsmodels>=0.14.0' \
            'structlog>=24.4.0' 'tenacity>=9.0.0' 'python-dotenv>=1.0.1' \
            'aiohttp>=3.11.0' 'anyio>=4.7.0' 'apscheduler>=3.10.4' \
            'pyyaml>=6.0' 'google-generativeai>=0.8.0' \
            'pytest>=8.3.0' 'pytest-asyncio>=0.24.0' 'pytest-timeout>=2.3.0' --quiet
          # Only run strategy smoke tests, not the full suite
          python -m pytest tests/unit/test_strategies.py -v --timeout=30 -q

      - name: Push changes
        continue-on-error: true
        run: |
          git config user.email "strategy-bot@quantedge.ai"
          git config user.name "QuantEdge Strategy Bot"
          git add backend/app/strategies/ experiments/configs/
          if ! git diff --cached --quiet; then
            git commit -m "feat(strategies): autonomous strategy generation — $(date -u '+%Y-%m-%d')"
            for i in 1 2 3 4; do
              git pull --rebase --quiet origin claude/advanced-trading-bot-d5Lmw && break || sleep $((i*2))
            done
            git push -u origin claude/advanced-trading-bot-d5Lmw || true
          else
            echo "No new strategies generated"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
