name: Backend AI Engineering Team

# Reviews backend code for bugs, security, and performance issues.
# Auto-fixes safe configuration files and reports to Slack.

on:
  schedule:
    - cron: "0 * * * *"    # Tuesday and Thursday at 2am UTC
  push:
    branches: [claude/advanced-trading-bot-d5Lmw]
    paths:
      - "backend/app/**/*.py"
      - "backend/pyproject.toml"
      - "render.yaml"
  workflow_dispatch:
    inputs:
      focus:
        description: "What to focus the audit on"
        required: false
        default: "bugs, security, performance, correctness"

concurrency:
  group: backend-team
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/advanced-trading-bot-d5Lmw
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install httpx anthropic --quiet

      - name: Configure git
        run: |
          git config user.name "QuantEdge-AI[bot]"
          git config user.email "ai@quantedge.io"

      - name: Run backend team audit
        env:
          ANTHROPIC_API_KEY: "disabled"
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          FOCUS: ${{ github.event.inputs.focus || 'bugs, security, performance, correctness' }}
        run: python .github/scripts/backend_team.py

      - name: Persist dedup state
        continue-on-error: true
        run: |
          git add .github/state/backend_team_dedup.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: backend-team dedup state [skip ci]"
          for i in 1 2 3 4; do
            git pull --rebase --quiet origin claude/advanced-trading-bot-d5Lmw && break || sleep $((i*2))
          done
          git push -u origin claude/advanced-trading-bot-d5Lmw || true
