name: Channel Monitor — self-healing channel diagnostics

# Reads every monitored channel, reports gaps, auto-heals silent agents.
# Posts structured report to #incidents and 1-line summary to #allquantedge.

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:

concurrency:
  group: channel-monitor
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 8
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --quiet langfuse litellm google-generativeai groq || true

      - name: Run channel monitor
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY_1 }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY_1 }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY_1 }}
          DEEPSEEK_API_KEY:   ${{ secrets.DEEPSEEK_API_KEY_1 }}
          DEEPSEEK_API_KEY_2: ${{ secrets.DEEPSEEK_API_KEY_2 }}
          DEEPSEEK_API_KEY_3: ${{ secrets.DEEPSEEK_API_KEY_3 }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST || 'https://cloud.langfuse.com' }}
          ALLOW_PAID_APIS: "False"
        run: |
          python .github/scripts/channel_monitor.py

      - name: Push changes
        continue-on-error: true
        run: |
          git config user.email "channel-monitor@quantedge.ai"
          git config user.name "QuantEdge Channel Monitor"
          STATE_FILE=".github/state/slack_state.json"
          if [ -f "$STATE_FILE" ] && ! git diff --quiet "$STATE_FILE" 2>/dev/null; then
            git add "$STATE_FILE"
            git commit -m "chore: persist channel monitor state [skip ci]"
            for i in 1 2 3 4; do
              git pull --rebase --quiet origin claude/advanced-trading-bot-d5Lmw && break || sleep $((i*2))
            done
            git push -u origin claude/advanced-trading-bot-d5Lmw || true
          fi
