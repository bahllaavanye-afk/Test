name: Claude ↔ Employee Conversations

on:
  schedule:
    # Claude talks to all employees every 2 hours — no downtime
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      channel:
        description: "Channel to chat with (leave empty for ALL)"
        required: false
        default: ""

jobs:
  converse:
    name: Claude talks to each employee via Gemini
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/advanced-trading-bot-d5Lmw
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install --quiet requests

      - name: Pull latest agent memory
        continue-on-error: true
        run: |
          git config user.email "agent-memory@quantedge.ai"
          git config user.name "Agent Memory System"
          git pull origin claude/advanced-trading-bot-d5Lmw --rebase || true

      - name: Run Claude ↔ Employee conversations
        continue-on-error: true
        env:
          SLACK_BOT_TOKEN:  ${{ secrets.SLACK_BOT_TOKEN }}
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY_1 }}
          GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY_1 }}
          PYTHONPATH:       ${{ github.workspace }}/backend
          CHANNEL_OVERRIDE: ${{ github.event.inputs.channel }}
        run: |
          ARGS=""
          if [ -n "$CHANNEL_OVERRIDE" ]; then
            ARGS="--channel $CHANNEL_OVERRIDE"
          fi
          python .github/scripts/claude_conversations.py $ARGS --all

      - name: Commit updated agent memory
        continue-on-error: true
        run: |
          git add .github/state/agent_memory.json || true
          git diff --cached --quiet || git commit -m "chore(memory): update agent memory state [skip ci]"
          git push -u origin claude/advanced-trading-bot-d5Lmw || true

      - name: Post conversation summary to GitHub step summary
        if: always()
        run: |
          echo "## Claude ↔ Employee Conversations" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f /tmp/conversations_summary.json ]; then
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/conversations_summary.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
