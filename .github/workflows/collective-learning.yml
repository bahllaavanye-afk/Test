name: Collective Learning Aggregator — Every 30 Minutes

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  learn:
    name: Distill agent learnings into shared skills
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/advanced-trading-bot-d5Lmw
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install --quiet requests

      - name: Configure git
        run: |
          git config user.email "collective@quantedge.ai"
          git config user.name "QuantEdge Collective Learner"

      - name: Run collective learner
        continue-on-error: true
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY_1 }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY_1 }}
          DEEPSEEK_API_KEY:   ${{ secrets.DEEPSEEK_API_KEY_1 }}
          DEEPSEEK_API_KEY_2: ${{ secrets.DEEPSEEK_API_KEY_2 }}
          DEEPSEEK_API_KEY_3: ${{ secrets.DEEPSEEK_API_KEY_3 }}
          SLACK_BOT_TOKEN:    ${{ secrets.SLACK_BOT_TOKEN }}
          ALLOW_PAID_APIS:    "False"
        run: python .github/scripts/collective_learner.py

      - name: Commit updated skill library
        continue-on-error: true
        run: |
          git add .github/state/skill_library.json .github/state/agent_memory.json .github/state/task_registry.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "learn: distill skills $(date -u +%H:%M) | $(python3 -c 'import json; d=json.load(open(".github/state/skill_library.json")); print(str(d[\"total\"])+\" skills\")' 2>/dev/null || echo '?')"

      - name: Push
        continue-on-error: true
        run: |
          for i in 1 2 3 4; do
            git pull --rebase --quiet origin claude/advanced-trading-bot-d5Lmw && break || sleep $((i*2))
          done
          git push -u origin claude/advanced-trading-bot-d5Lmw || true

      - name: Step summary
        if: always()
        run: |
          echo "## Collective Learning — $(date -u)" >> "$GITHUB_STEP_SUMMARY"
          if [ -f /tmp/collective_learning_summary.json ]; then
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/collective_learning_summary.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
