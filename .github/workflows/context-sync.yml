name: "Context Sync"

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  context-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run context sync
        run: python .github/scripts/context_sync.py
        env:
          ALLOW_PAID_APIS: "False"
          ANTHROPIC_API_KEY: "disabled"

      - name: Commit shared_context.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/state/shared_context.md
          git diff --staged --quiet || git commit -m "chore(context): sync shared context $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]" && git push origin HEAD
        continue-on-error: true
