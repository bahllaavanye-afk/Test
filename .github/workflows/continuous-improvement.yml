name: Continuous Improvement — Autonomous Code Quality (CTO OKR ≥50 commits/day)

on:
  schedule:
    # Every 30 minutes — 48 runs/day × 3 commits each = 144+ commits/day toward CTO OKR
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      n_files:
        description: "Number of files to improve per run (1-5)"
        required: false
        default: "3"

jobs:
  improve:
    name: Gemini improves 5 files and commits
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/advanced-trading-bot-d5Lmw
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install --quiet requests

      - name: Configure git
        run: |
          git config user.email "ai-improver@quantedge.ai"
          git config user.name "QuantEdge Continuous Improver"

      - name: Run continuous improver
        continue-on-error: true
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY_1 }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY_1 }}
          DEEPSEEK_API_KEY:   ${{ secrets.DEEPSEEK_API_KEY_1 }}
          DEEPSEEK_API_KEY_2: ${{ secrets.DEEPSEEK_API_KEY_2 }}
          DEEPSEEK_API_KEY_3: ${{ secrets.DEEPSEEK_API_KEY_3 }}
          SAMBANOVA_API_KEY:  ${{ secrets.SAMBANOVA_API_KEY_1 }}
          CEREBRAS_API_KEY:   ${{ secrets.CEREBRAS_API_KEY_1 }}
          HYPERBOLIC_API_KEY: ${{ secrets.HYPERBOLIC_API_KEY_1 }}
          NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
          NVIDIA_AGENTS_API_KEYS: ${{ secrets.NVIDIA_AGENTS_API_KEYS }}
          TOGETHER_API_KEY:   ${{ secrets.TOGETHER_API_KEY_1 }}
          GH_TOKEN:           ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:            ${{ github.repository }}
          ALLOW_PAID_APIS:    "False"
          N_FILES:            ${{ github.event.inputs.n_files || '5' }}
          PYTHONPATH:         ${{ github.workspace }}/backend
        run: python .github/scripts/continuous_improver.py

      - name: Push commits
        continue-on-error: true
        run: |
          for i in 1 2 3 4; do
            git pull --rebase --quiet origin claude/advanced-trading-bot-d5Lmw && break || sleep $((i*2))
          done
          git pull --rebase --quiet origin claude/advanced-trading-bot-d5Lmw 2>/dev/null || true; git push -u origin claude/advanced-trading-bot-d5Lmw || true || true
      - name: Post to step summary
        if: always()
        run: |
          echo "## Continuous Improvement Run" >> "$GITHUB_STEP_SUMMARY"
          echo "Ran at: $(date -u)" >> "$GITHUB_STEP_SUMMARY"
          if [ -f /tmp/continuous_improvement_summary.json ]; then
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/continuous_improvement_summary.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
