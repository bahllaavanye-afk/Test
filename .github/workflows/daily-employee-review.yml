name: Daily Employee Review — strict daily scoring

# Runs every day at 07:00 UTC. Reviews every employee's Slack presence,
# domain quality, and codebase contributions. Posts scores to #leadership-summary.

on:
  schedule:
    - cron: "0 7 * * *"   # every day at 07:00 UTC
  workflow_dispatch:

concurrency:
  group: daily-employee-review
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install --quiet langfuse litellm google-generativeai groq || true
          pip install --quiet pyyaml requests || true

      - name: Run daily employee review
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST || 'https://cloud.langfuse.com' }}
          ALLOW_PAID_APIS: "False"
        run: python .github/scripts/slack_agent_team.py --review-employees

      - name: Persist agent state
        if: always()
        run: |
          git config user.email "agents@quantedge.ai"
          git config user.name "QuantEdge Agent Team"
          STATE_FILE="backend/experiments/results/slack_state.json"
          if [ -f "$STATE_FILE" ] && ! git diff --quiet "$STATE_FILE" 2>/dev/null; then
            git add "$STATE_FILE"
            git commit -m "chore: persist agent state [skip ci]"
            git push origin HEAD:claude/advanced-trading-bot-d5Lmw || true
          fi

      - name: Run experiments status
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ALLOW_PAID_APIS: "False"
        run: python .github/scripts/slack_agent_team.py --run-experiments
        continue-on-error: true
