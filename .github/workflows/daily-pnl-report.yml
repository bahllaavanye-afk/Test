name: Daily P&L Attribution Report

on:
  schedule:
    # 21:30 UTC weekdays = ~5:30 PM ET (30 min after market close reconciliation)
    - cron: "30 */4 * * *"
  workflow_dispatch:
    inputs:
      days:
        description: "Lookback days for attribution"
        required: false
        default: "1"

jobs:
  daily-report:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/advanced-trading-bot-d5Lmw
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --quiet \
            pandas numpy requests python-dotenv structlog alpaca-py

      - name: Generate and post daily P&L report
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          SLACK_BOT_TOKEN:   ${{ secrets.SLACK_BOT_TOKEN }}
          DAYS: ${{ github.event.inputs.days || '1' }}
        run: python .github/scripts/daily_pnl_report.py
