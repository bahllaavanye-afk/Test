name: Daily Standup — All Employees (13:00 UTC)

on:
  schedule:
    # Daily all-hands standup at 13:00 UTC per org cadence
    - cron: "0 13 * * *"
    # Squad standups at 13:30 UTC
    - cron: "30 13 * * *"
    # Alpha review at 17:00 UTC
    - cron: "0 17 * * *"
    # Risk EOD at 20:30 UTC
    - cron: "30 20 * * *"
  workflow_dispatch:
    inputs:
      event_type:
        description: "standup | alpha_review | risk_eod | squad_standup"
        required: false
        default: "standup"

jobs:
  standup:
    name: Post standup to all team channels
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/advanced-trading-bot-d5Lmw
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install --quiet requests

      - name: Run standup agent
        continue-on-error: true
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEY_1 }}
          GROQ_API_KEY:    ${{ secrets.GROQ_API_KEY_1 }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY_1 }}
          GH_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:         ${{ github.repository }}
          ALLOW_PAID_APIS: "False"
          EVENT_TYPE:      ${{ github.event.inputs.event_type || 'auto' }}
        run: python .github/scripts/standup_agent.py
