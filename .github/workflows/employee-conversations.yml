name: "Employee Conversations (hourly)"

on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:

jobs:
  employee-conversations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic langfuse 2>/dev/null || true

      - name: Run employee conversations
        run: python .github/scripts/employee_conversation_runner.py 2>&1 | tee /tmp/conv_output.txt
        continue-on-error: true
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          HYPERBOLIC_API_KEY: ${{ secrets.HYPERBOLIC_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          ALLOW_PAID_APIS: "False"
          ANTHROPIC_API_KEY: "disabled"

      - name: Post Slack report
        run: |
          python - <<'PYEOF'
          import os, re, sys
          sys.path.insert(0, ".github/scripts")
          import notify_slack

          output = ""
          try:
              with open("/tmp/conv_output.txt") as f:
                  output = f.read()
          except FileNotFoundError:
              pass

          responded = "0"
          failed_str = "none"
          m = re.search(r"RESPONDED_COUNT=(\d+)", output)
          if m:
              responded = m.group(1)
          m2 = re.search(r"FAILED_EMPLOYEES=(.+)", output)
          if m2 and m2.group(1).strip():
              failed_str = m2.group(1).strip()

          # Extract provider info (lines containing "via " pattern)
          providers = re.findall(r"\(via ([^)]+)\)", output)
          provider_summary = ", ".join(sorted(set(providers))) if providers else "see logs"

          run_url = notify_slack.RUN_URL
          text = (
              ":busts_in_silhouette: *Employee Conversations* — Run complete\n"
              f"Responded: {responded}/47 employees\n"
              f"Providers used: {provider_summary}\n"
              f"Failed: {failed_str}\n"
              f"<{run_url}|View details →>"
          )
          notify_slack._post("#engineering", text)
          PYEOF
        continue-on-error: true
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_WORKFLOW: ${{ github.workflow }}

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/state/
          git diff --staged --quiet || git commit -m "chore(agents): hourly employee conversations $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]" && git push origin HEAD
        continue-on-error: true

      - name: Open issue on failures
        run: |
          python - <<'PYEOF'
          import os, re
          output = ""
          try:
              with open("/tmp/conv_output.txt") as f:
                  output = f.read()
          except FileNotFoundError:
              pass
          m = re.search(r"FAILED_EMPLOYEES=(.+)", output)
          if m and m.group(1).strip():
              failed = [e for e in m.group(1).strip().split(",") if e.strip()]
              if len(failed) > 5:
                  import subprocess, sys
                  subprocess.run([sys.executable, ".github/scripts/free_agent_engineer.py"], check=False)
          PYEOF
        continue-on-error: true
