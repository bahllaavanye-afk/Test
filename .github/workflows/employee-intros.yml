name: Daily Employee Introductions (2-Round Conversations)

on:
  schedule:
    - cron: "0 9 * * *"    # 09:00 UTC daily — morning stand-up energy
  workflow_dispatch:         # manual trigger to test immediately

concurrency:
  group: employee-intros
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  intros:
    name: Employee Intros + 2-Round Conversations
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/advanced-trading-bot-d5Lmw

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install uv --quiet && uv pip install --system 'requests>=2.32.0'

      - name: Run employee introduction conversations
        env:
          ANTHROPIC_API_KEY: "disabled"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          HYPERBOLIC_API_KEY: ${{ secrets.HYPERBOLIC_API_KEY }}
          NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
          NVIDIA_AGENTS_API_KEYS: ${{ secrets.NVIDIA_AGENTS_API_KEYS }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_API_KEY_2: ${{ secrets.OPENROUTER_API_KEY_2 }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          ALLOW_PAID_APIS: "False"
        run: python .github/scripts/employee_intros.py
