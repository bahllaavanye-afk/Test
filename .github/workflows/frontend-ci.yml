name: Frontend CI — build gate + auto-fix loop

# Closes the loop that let a truncated component (RegimeIndicator.tsx ended
# mid-line at `60_`) break Vercel for days with nothing reacting:
#   CATCH  — run the real `npm run build` on every frontend change; go RED on break.
#   REPORT — on failure, ping #ci-failures AND auto-file an `agent-fix-needed`
#            issue (idempotent) with the build error.
#   FIX    — that label triggers free-agent-engineer.yml, which patches it and
#            opens a PR; this same gate then verifies the PR before it can merge.
# Vercel was a dead-end signal (it only commented "Error"); now build failures
# become self-healing work items.

on:
  push:
    paths:
      - "frontend/**"
  pull_request:
    paths:
      - "frontend/**"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Build (tsc + vite) — the real production build
        id: build
        working-directory: frontend
        run: |
          set -o pipefail
          npm run build 2>&1 | tee /tmp/fe-build.log

      - name: Alert Slack on build failure
        if: failure()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          [ -z "${SLACK_BOT_TOKEN:-}" ] && { echo "no SLACK_BOT_TOKEN — skip"; exit 0; }
          python3 - <<'PY'
          import os, json, urllib.request
          tok = os.environ["SLACK_BOT_TOKEN"]
          text = (":red_circle: *Frontend build FAILED* — `npm run build` does not compile on "
                  f"`{os.environ.get('GITHUB_REF_NAME','?')}`. Blocked before reaching Vercel; "
                  "auto-filing a fix issue for the agents.")
          body = json.dumps({"channel": "#ci-failures", "text": text}).encode()
          req = urllib.request.Request("https://slack.com/api/chat.postMessage", data=body,
                headers={"Authorization": "Bearer " + tok, "Content-Type": "application/json"})
          try: urllib.request.urlopen(req, timeout=10)
          except Exception as e: print("slack post failed:", e)
          PY

      - name: Auto-file an agent-fix-needed issue (idempotent)
        if: failure() && github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA: ${{ github.sha }}
        run: |
          python3 - <<'PY'
          import os, json, urllib.request, urllib.error
          tok=os.environ["GITHUB_TOKEN"]; repo=os.environ["REPO"]; branch=os.environ["BRANCH"]
          api="https://api.github.com"
          H={"Authorization":"Bearer "+tok,"Accept":"application/vnd.github+json","User-Agent":"frontend-ci"}
          def req(method,url,data=None):
              r=urllib.request.Request(url,data=json.dumps(data).encode() if data else None,headers=H,method=method)
              try: return json.loads(urllib.request.urlopen(r,timeout=20).read())
              except urllib.error.HTTPError as e: print("gh",e.code,e.read()[:200].decode()); return None
          marker=f"[frontend-ci] build broken on {branch}"
          # idempotent: skip if an open issue with this marker already exists
          existing=req("GET",f"{api}/repos/{repo}/issues?state=open&labels=agent-fix-needed&per_page=100") or []
          if any(marker in (i.get('title','')) for i in existing):
              print("issue already open — skipping"); raise SystemExit
          try: log=open("/tmp/fe-build.log").read()[-2500:]
          except Exception: log="(build log unavailable)"
          body=(f"`npm run build` (tsc + vite) is failing on `{branch}` — broken frontend code is "
                f"blocking every Vercel deploy.\n\nCommit: `{os.environ.get('SHA','')[:8]}`\n"
                f"Run: {os.environ.get('RUN_URL','')}\n\n```\n{log}\n```\n\n"
                "**Fix the compile error so `cd frontend && npm run build` passes.** "
                "Common cause: a component was committed truncated/syntactically invalid.")
          out=req("POST",f"{api}/repos/{repo}/issues",{"title":f"🔴 {marker}","body":body,
                  "labels":["agent-fix-needed","frontend"]})
          print("filed issue:", out.get("html_url") if out else "FAILED")
          PY
