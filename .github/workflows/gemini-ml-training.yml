name: Gemini Free Cloud ML Training

on:
  schedule:
    # Run daily at 01:00 UTC (before nightly retrain at 02:00)
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      symbol:
        description: "Symbol to train (or 'all' for all symbols)"
        default: "all"
      interval:
        description: "Bar interval"
        default: "1d"

concurrency:
  group: gemini-training
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  train:
    name: Gemini Cloud Training
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check API key configured
        id: key_check
        working-directory: ${{ github.workspace }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY not configured — skipping"
            echo "has_key=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_1 }}

      - uses: actions/checkout@v4
        with:
          ref: claude/advanced-trading-bot-d5Lmw

      - uses: actions/setup-python@v5
        if: steps.key_check.outputs.has_key == 'true'
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        if: steps.key_check.outputs.has_key == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          pip install --quiet \
            'google-generativeai>=0.8.0' \
            'yfinance>=0.2.0' 'pandas>=2.2.0' 'numpy>=1.26.0' \
            'pydantic-settings>=2.6.0' 'python-dotenv>=1.0.1' \
            'structlog>=24.4.0' 'pyyaml>=6.0'

      - name: Train all symbols with Gemini
        if: steps.key_check.outputs.has_key == 'true'
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_1 }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_API_KEY_2: ${{ secrets.OPENROUTER_API_KEY_2 }}
          PYTHONPATH: "."
        run: |
          SYMBOL="${{ github.event.inputs.symbol || 'all' }}"
          if [ "$SYMBOL" = "all" ]; then
            python -m app.ml.training.train_gemini --all 2>&1 | tee /tmp/gemini_train.log
          else
            INTERVAL="${{ github.event.inputs.interval || '1d' }}"
            python -m app.ml.training.train_gemini --symbol "$SYMBOL" --interval "$INTERVAL" 2>&1 | tee /tmp/gemini_train.log
          fi

      - name: Show results summary
        if: steps.key_check.outputs.has_key == 'true'
        run: |
          echo "## Gemini Training Results" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          if [ -d "../experiments/results" ]; then
            ls -lt ../experiments/results/*.json 2>/dev/null | head -10 | awk '{print $NF}' | while read f; do
              echo "=== $(basename $f) ===" >> "$GITHUB_STEP_SUMMARY"
              python3 -c "import json,sys; d=json.load(open('$f')); print('  symbol:',d.get('symbol','?')); a=d.get('test_accuracy'); print(f'  accuracy: {a:.3f}' if isinstance(a,float) else f'  accuracy: {a}'); s=d.get('test_sharpe'); print(f'  sharpe: {s:.3f}' if isinstance(s,float) else f'  sharpe: {s}'); print('  status:',d.get('status','?'))" 2>/dev/null || head -5 "$f"
            done
          fi
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Push changes
        continue-on-error: true
        if: steps.key_check.outputs.has_key == 'true'
        run: |
          cd ..
          git config user.email "gemini-trainer@quantedge.ai"
          git config user.name "Gemini ML Trainer"
          git add experiments/results/*.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "feat(ml): Gemini cloud training results — $(date -u '+%Y-%m-%d')"
            for i in 1 2 3 4; do
              git pull --rebase --quiet origin claude/advanced-trading-bot-d5Lmw && break || sleep $((i*2))
            done
            git push -u origin claude/advanced-trading-bot-d5Lmw || true
          else
            echo "No new results to commit"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
