name: Gemini Task Runner — free-LLM code changes

# Picks up open issues labeled "gemini-task", sends each to Gemini Flash (or
# Groq fallback), applies multi-file code changes, commits, and closes the issue.
# This is how Claude offloads complex work to free LLMs instead of using paid API context.

on:
  issues:
    types: [labeled]           # fires immediately when gemini-task label is added
  schedule:
    - cron: "*/20 * * * *"    # batch retry every 20 min for rate-limited issues
  push:
    branches: [claude/advanced-trading-bot-d5Lmw]
    paths-ignore:
      - ".github/state/slack_state.json"  # don't re-run on state commits
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Run a specific issue number (leave blank for batch)"
        required: false
        type: string
      task:
        description: "Inline task description (skips issues)"
        required: false
        type: string

concurrency:
  group: gemini-task-runner
  cancel-in-progress: false   # never cancel — tasks are idempotent but slow

jobs:
  run-task:
    # Only fire on issue events when the label is "gemini-task" AND the issue
    # was opened by a trusted member — never act on issue text from external/
    # untrusted authors (prevents Slack/issue → auto-commit injection chains).
    if: >
      github.event_name != 'issues' ||
      (github.event.label.name == 'gemini-task' &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association))
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/advanced-trading-bot-d5Lmw
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install --quiet google-generativeai groq || true

      - name: Run Gemini task runner
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_API_KEY_2: ${{ secrets.OPENROUTER_API_KEY_2 }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          ALLOW_PAID_APIS: "False"
          # Pass untrusted GitHub inputs via env, never inline in the shell —
          # prevents command injection through inputs.task / issue numbers.
          INPUT_TASK: ${{ inputs.task }}
          INPUT_ISSUE: ${{ inputs.issue_number }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ISSUE: ${{ github.event.issue.number }}
        run: |
          if [ -n "$INPUT_TASK" ]; then
            python .github/scripts/gemini_task_runner.py --task "$INPUT_TASK"
          elif [ -n "$INPUT_ISSUE" ]; then
            python .github/scripts/gemini_task_runner.py --issue "$INPUT_ISSUE"
          elif [ "$EVENT_NAME" = "issues" ]; then
            python .github/scripts/gemini_task_runner.py --issue "$EVENT_ISSUE"
          else
            python .github/scripts/gemini_task_runner.py
          fi
