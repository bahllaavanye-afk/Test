name: Keep-Alive — stop the Render backend from sleeping

# Render's free web service sleeps after ~15 min of no HTTP traffic. When it sleeps the
# 24/7 trade engine (StrategyRunner / BotRunner / PriceFeed) stops, so almost no orders
# fire — the root cause of "only one trade / flat PnL". This pings /health frequently to
# keep it awake. (For guaranteed uptime an external monitor like UptimeRobot is more
# reliable than GitHub's cron, which can be delayed — this is the zero-setup option.)

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: keep-alive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Ping health (loop to bridge cron jitter)
        run: |
          URL="${{ vars.RENDER_API_URL || 'https://quantedge-api-agb8.onrender.com' }}/health"
          ok=0
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 45 "$URL" || echo "000")
            echo "ping $i -> $URL : HTTP $code"
            [ "$code" = "200" ] && ok=1
            [ "$i" -lt 3 ] && sleep 150
          done
          if [ "$ok" = "1" ]; then echo "✅ backend awake"; else
            echo "::warning::backend did not return 200 — it may be down or still waking"; fi
