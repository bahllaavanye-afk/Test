name: Market Scanner — Intraday Regime + Sector + Breakout Analysis

on:
  schedule:
    # Market open: 14:00 UTC (9:00 ET), 15:00, 16:00, 17:00, 18:00, 19:00, 20:00 UTC
    - cron: "0 14 * * 1-5"
    - cron: "0 15 * * 1-5"
    - cron: "0 16 * * 1-5"
    - cron: "0 17 * * 1-5"
    - cron: "0 18 * * 1-5"
    - cron: "0 19 * * 1-5"
    - cron: "0 20 * * 1-5"
  workflow_dispatch:

jobs:
  scan:
    name: Advanced market scan — sectors, breakouts, regime, crypto
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/advanced-trading-bot-d5Lmw
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install --quiet requests yfinance

      - name: Configure git
        run: |
          git config user.email "market-scanner@quantedge.ai"
          git config user.name "QuantEdge Market Scanner"

      - name: Run market scanner
        env:
          ALLOW_PAID_APIS: "False"
          ANTHROPIC_API_KEY: "disabled"
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          HYPERBOLIC_API_KEY: ${{ secrets.HYPERBOLIC_API_KEY }}
          NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
          NVIDIA_AGENTS_API_KEYS: ${{ secrets.NVIDIA_AGENTS_API_KEYS }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_API_KEY_2: ${{ secrets.OPENROUTER_API_KEY_2 }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          cd $GITHUB_WORKSPACE
          python .github/scripts/market_scanner.py

      - name: Commit brain state update
        run: |
          git add .github/state/ || true
          git diff --cached --quiet || git commit -m "scan: market scanner state update [skip ci]"
          git pull --rebase origin claude/advanced-trading-bot-d5Lmw || true
          git push origin claude/advanced-trading-bot-d5Lmw || true
