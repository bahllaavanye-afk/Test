name: Member Standup — every 3 hours, threaded replies

# Every 3 hours, each desk/squad lead opens a standup thread and every member
# replies in-thread with a persona-specific update. Uses model_router → free
# LLMs only (groq/cerebras/gemini); Claude is never used for standups.

on:
  schedule:
    - cron: "0 */3 * * *"   # 00,03,06,09,12,15,18,21 UTC — 8x/day
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: member-standup
  cancel-in-progress: false

jobs:
  standup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/advanced-trading-bot-d5Lmw
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install --quiet requests

      - name: Run 3-hourly member standup
        continue-on-error: true
        env:
          SLACK_BOT_TOKEN:    ${{ secrets.SLACK_BOT_TOKEN }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2:   ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3:   ${{ secrets.GEMINI_API_KEY_3 }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2:     ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3:     ${{ secrets.GROQ_API_KEY_3 }}
          DEEPSEEK_API_KEY:   ${{ secrets.DEEPSEEK_API_KEY_1 }}
          DEEPSEEK_API_KEY_2: ${{ secrets.DEEPSEEK_API_KEY_2 }}
          DEEPSEEK_API_KEY_3: ${{ secrets.DEEPSEEK_API_KEY_3 }}
          SAMBANOVA_API_KEY:  ${{ secrets.SAMBANOVA_API_KEY_1 }}
          CEREBRAS_API_KEY:   ${{ secrets.CEREBRAS_API_KEY_1 }}
          HYPERBOLIC_API_KEY: ${{ secrets.HYPERBOLIC_API_KEY_1 }}
          TOGETHER_API_KEY:   ${{ secrets.TOGETHER_API_KEY_1 }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_API_KEY_2: ${{ secrets.OPENROUTER_API_KEY_2 }}
          NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
          # Claude stays disabled for standups (fast tier = free only).
          ANTHROPIC_API_KEY:  ""
          ALLOW_CLAUDE_SENIOR: "false"
          ALLOW_PAID_APIS:    "False"
          GH_TOKEN:           ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:            ${{ github.repository }}
        run: python .github/scripts/member_standup.py
