name: Memory Consolidator — Nightly Knowledge Distillation

on:
  schedule:
    - cron: "0 2 * * *"    # 2 AM UTC daily
  workflow_dispatch:

jobs:
  consolidate:
    name: Distil 200 learnings into topic knowledge base
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/advanced-trading-bot-d5Lmw
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install --quiet requests

      - name: Configure git
        run: |
          git config user.email "memory@quantedge.ai"
          git config user.name "QuantEdge Memory Bot"

      - name: Run memory consolidation
        env:
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY_1 }}
          DEEPSEEK_API_KEY:     ${{ secrets.DEEPSEEK_API_KEY_1 }}
          DEEPSEEK_API_KEY_2:   ${{ secrets.DEEPSEEK_API_KEY_2 }}
          DEEPSEEK_API_KEY_3:   ${{ secrets.DEEPSEEK_API_KEY_3 }}
          SAMBANOVA_API_KEY:    ${{ secrets.SAMBANOVA_API_KEY_1 }}
          CEREBRAS_API_KEY:     ${{ secrets.CEREBRAS_API_KEY_1 }}
          HYPERBOLIC_API_KEY:   ${{ secrets.HYPERBOLIC_API_KEY_1 }}
          NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
          NVIDIA_AGENTS_API_KEYS: ${{ secrets.NVIDIA_AGENTS_API_KEYS }}
          TOGETHER_API_KEY:     ${{ secrets.TOGETHER_API_KEY_1 }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY_1 }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_API_KEY_2: ${{ secrets.OPENROUTER_API_KEY_2 }}
          ALLOW_PAID_APIS:      "False"
        run: python .github/scripts/memory_consolidator.py

      - name: Commit
        continue-on-error: true
        run: |
          git add .github/state/knowledge_base.json .github/state/skill_library.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "memory: nightly knowledge consolidation $(date -u +%Y-%m-%d)"

      - name: Push
        continue-on-error: true
        run: |
          for i in 1 2 3 4; do
            git pull --rebase --quiet origin claude/advanced-trading-bot-d5Lmw && break || sleep $((i*2))
          done
          git push -u origin claude/advanced-trading-bot-d5Lmw || true

      - name: Summary
        if: always()
        run: |
          echo "## Memory Consolidation — $(date -u)" >> "$GITHUB_STEP_SUMMARY"
          python3 -c "
          import json, pathlib
          try:
              kb = json.loads(pathlib.Path('.github/state/knowledge_base.json').read_text())
              print(f'- Learnings processed: {kb.get(\"total_learnings_processed\", 0)}')
              print(f'- Topics: {list(kb.get(\"topics\", {}).keys())}')
              for t, d in kb.get(\"topics\", {}).items():
                  print(f'\n### {t} ({d[\"source_count\"]} entries)')
                  print(d[\"summary\"][:200])
          except Exception as e:
              print(f'Error: {e}')
          " >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
