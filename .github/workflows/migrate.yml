name: Migrate Supabase Schema

# Run on demand from the GitHub UI:
# https://github.com/bahllaavanye-afk/QuantEdge/actions/workflows/migrate.yml
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Migration mode"
        required: true
        default: "upgrade-head"
        type: choice
        options:
          - upgrade-head
          - downgrade-base
          - current
          - history

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/advanced-trading-bot-d5Lmw

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install alembic + driver
        run: |
          pip install --upgrade pip
          pip install alembic sqlalchemy psycopg2-binary 'pydantic[email]' pydantic-settings \
            asyncpg structlog python-jose[cryptography] passlib bcrypt==4.0.1 \
            redis httpx pandas numpy scipy scikit-learn 'fastapi' 'uvicorn[standard]'

      - name: Run alembic
        env:
          ALEMBIC_DATABASE_URL: ${{ secrets.ALEMBIC_DATABASE_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          TRADING_MODE: paper
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL: https://paper-api.alpaca.markets
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: |
          case "${{ inputs.mode }}" in
            upgrade-head)    alembic upgrade head ;;
            downgrade-base)  alembic downgrade base ;;
            current)         alembic current ;;
            history)         alembic history ;;
          esac

      - name: Confirm tables present
        if: ${{ inputs.mode == 'upgrade-head' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python <<'PY'
          import os, asyncio
          from sqlalchemy.ext.asyncio import create_async_engine
          from sqlalchemy import text

          url = os.environ["DATABASE_URL"]
          # Force the asyncpg driver for SQLAlchemy
          if url.startswith("postgresql://"):
              url = url.replace("postgresql://", "postgresql+asyncpg://", 1)

          async def main():
              engine = create_async_engine(url)
              async with engine.connect() as conn:
                  result = await conn.execute(text(
                      "SELECT tablename FROM pg_tables WHERE schemaname='public' ORDER BY tablename"
                  ))
                  tables = [r[0] for r in result.fetchall()]
                  print(f"\n{len(tables)} tables in Supabase:")
                  for t in tables:
                      print(f"  - {t}")
              await engine.dispose()

          asyncio.run(main())
          PY
