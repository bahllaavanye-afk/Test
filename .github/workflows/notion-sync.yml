name: Notion ↔ GitHub Issues Sync

on:
  workflow_dispatch:
    inputs:
      notion_token:
        description: "Notion integration token (ntn_...) — paste once, then rotate"
        required: true
        type: string
      parent_page_id:
        description: "Notion parent page ID to create the Tasks DB under (32-char hex, no dashes). Leave blank to use existing DB by id."
        required: false
        type: string
      existing_db_id:
        description: "Existing Notion DB ID to sync into (skip create). 32-char hex, no dashes."
        required: false
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install httpx
      - name: Sync
        env:
          NOTION_TOKEN: ${{ inputs.notion_token }}
          NOTION_PARENT_PAGE: ${{ inputs.parent_page_id }}
          NOTION_DB_ID: ${{ inputs.existing_db_id }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: python .github/scripts/notion_sync.py
