name: QuantEdge Pre-Compute (Off-Peak)

# Runs at 2:00 AM UTC daily — generates content for peak hours so the
# 6AM/9AM/12PM/3PM runs can use cached results instead of burning API quota.

on:
  schedule:
    - cron: "0 2 * * *"   # 2:00 AM UTC daily
  workflow_dispatch:

concurrency:
  group: pre-compute
  cancel-in-progress: false

jobs:
  precompute:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      actions: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: experiments/results/slack_state.json
          key: slack-state-${{ github.run_id }}
          restore-keys: |
            slack-state-

      - name: Install deps
        run: pip install --quiet httpx

      - name: Pre-compute analysis cache
        env:
          SLACK_BOT_TOKEN:   ${{ secrets.SLACK_BOT_TOKEN }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_1:    ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2:    ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3:    ${{ secrets.GROQ_API_KEY_3 }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_1:  ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2:  ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3:  ${{ secrets.GEMINI_API_KEY_3 }}
          CEREBRAS_API_KEY:  ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY:  ${{ secrets.SAMBANOVA_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:           ${{ github.repository }}
          TRADING_MODE:      test
          DATABASE_URL:      sqlite+aiosqlite:///./test.db
          SECRET_KEY:        test-secret-key-32-bytes-xxxxxxxx
        run: |
          mkdir -p experiments/results
          python .github/scripts/slack_agent_team.py precompute

      - name: Save state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: experiments/results/slack_state.json
          key: slack-state-${{ github.run_id }}
