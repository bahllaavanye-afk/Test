name: Red Team — continuous security scan

# Adversarial security scan of the multi-agent setup. Deterministic checks run
# with zero keys (always works); an optional free-LLM review of the recent diff
# runs when a provider key is present. Findings post to #security-alerts.

on:
  push:
    branches:
      - claude/advanced-trading-bot-d5Lmw
      - main
  schedule:
    - cron: "0 */4 * * *"   # every 4h — red team is "always working"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: red-team
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run red team scan
        env:
          SLACK_BOT_TOKEN:    ${{ secrets.SLACK_BOT_TOKEN }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY_1 }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY_1 }}
          DEEPSEEK_API_KEY:   ${{ secrets.DEEPSEEK_API_KEY_1 }}
          ALLOW_PAID_APIS:    "False"
          ALLOW_CLAUDE_SENIOR: "false"
        run: python .github/scripts/red_team.py
