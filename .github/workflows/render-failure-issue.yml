name: Render Failure → GitHub Issue Bridge

# When a Render deploy fails, creates/updates a GitHub Issue with the full logs.
# QuantEdge AI (via MCP) can read the issue and auto-fix without the user copy-pasting.

on:
  schedule:
    - cron: "*/10 * * * *"   # Every 10 minutes
  workflow_dispatch:
  repository_dispatch:       # External trigger (Render webhook)
    types: [render-deploy-failed]

concurrency:
  group: render-failure-issue
  cancel-in-progress: true

jobs:
  bridge:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx --quiet

      - name: Check Render & bridge failures
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: python .github/scripts/render_failure_issue.py
