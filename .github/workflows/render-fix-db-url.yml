name: Render — Fix DATABASE_URL (Supabase pooler)

# One-click fix: rewrites the Render DATABASE_URL from the Supabase DIRECT host
# (IPv6, unreachable) to the IPv4 Session Pooler host, then redeploys.
# Run from Actions tab → this workflow → Run workflow → enter your Supabase region.

on:
  workflow_dispatch:
    inputs:
      region:
        description: "Supabase region (e.g. us-east-1, eu-central-1, ap-southeast-1)"
        required: true
        type: string
      port:
        description: "Pooler port: 6543 (transaction) or 5432 (session)"
        required: false
        default: "6543"

jobs:
  fix-db-url:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install httpx --quiet
      - name: Patch DATABASE_URL on Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_WORKER_SERVICE_ID: ${{ secrets.RENDER_WORKER_SERVICE_ID }}
          SUPABASE_REGION: ${{ github.event.inputs.region }}
          SUPABASE_POOLER_PORT: ${{ github.event.inputs.port }}
        run: python .github/scripts/render_fix_db_url.py
