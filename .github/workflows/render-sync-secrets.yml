name: Render — Sync LLM/Slack secrets

# Make GitHub Secrets the single source of truth for the Render runtime.
#
# Copies the LLM + Slack keys from GitHub Secrets into the Render service via
# the API, then triggers + verifies a redeploy. No more pasting keys into the
# Render dashboard — set them once in GitHub Secrets and forget.
#
# Reuses the existing RENDER_API_KEY + RENDER_SERVICE_ID secrets. Reads every
# numbered key variant (GROQ_API_KEY_1, DEEPSEEK_API_KEY_1/2/3, ...) and maps
# them to the canonical names the backend gateway resolves. Empty secrets are
# skipped, so nothing is ever blanked out.

on:
  push:
    branches:
      - claude/advanced-trading-bot-d5Lmw
      - main
    paths:
      - ".github/workflows/render-sync-secrets.yml"
      - ".github/scripts/render_sync_secrets.py"
      - "render.yaml"
      - "backend/render.yaml"
  schedule:
    - cron: "0 */6 * * *"   # every 6h: key rotations auto-propagate to Render
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: render-sync-secrets
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install httpx --quiet

      - name: Guard — Render secrets present?
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "::warning::RENDER_API_KEY / RENDER_SERVICE_ID not set — skipping."
            echo "SKIP=1" >> "$GITHUB_ENV"
          fi

      - name: Push LLM/Slack keys into Render runtime
        if: env.SKIP != '1'
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_WORKER_SERVICE_ID: ${{ secrets.RENDER_WORKER_SERVICE_ID }}
          # Gemini
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          # Groq
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          # DeepSeek
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_API_KEY_1: ${{ secrets.DEEPSEEK_API_KEY_1 }}
          DEEPSEEK_API_KEY_2: ${{ secrets.DEEPSEEK_API_KEY_2 }}
          DEEPSEEK_API_KEY_3: ${{ secrets.DEEPSEEK_API_KEY_3 }}
          # Other free providers
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          SAMBANOVA_API_KEY_1: ${{ secrets.SAMBANOVA_API_KEY_1 }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          CEREBRAS_API_KEY_1: ${{ secrets.CEREBRAS_API_KEY_1 }}
          CEREBRAS_API_KEY_2: ${{ secrets.CEREBRAS_API_KEY_2 }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          TOGETHER_API_KEY_1: ${{ secrets.TOGETHER_API_KEY_1 }}
          HYPERBOLIC_API_KEY: ${{ secrets.HYPERBOLIC_API_KEY }}
          HYPERBOLIC_API_KEY_1: ${{ secrets.HYPERBOLIC_API_KEY_1 }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_API_KEY_2: ${{ secrets.OPENROUTER_API_KEY_2 }}
          NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
          NVIDIA_AGENTS_API_KEYS: ${{ secrets.NVIDIA_AGENTS_API_KEYS }}
          # Claude (senior roles only — see CLAUDE_SENIOR_ROLES) + Slack
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: python .github/scripts/render_sync_secrets.py
