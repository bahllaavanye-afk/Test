name: Render — Sync LLM/Slack secrets

# Make GitHub Secrets the single source of truth for the Render runtime.
#
# On every push (and on demand), copy the LLM + Slack keys from GitHub Secrets
# into the Render service via the API, then trigger a redeploy. No more pasting
# keys into the Render dashboard — set them once in GitHub Secrets and forget.
#
# Reuses the existing RENDER_API_KEY + RENDER_SERVICE_ID secrets (same ones
# render-autofix.yml uses). The keys themselves (GROQ_API_KEY, etc.) are read
# from GitHub Secrets; empty ones are skipped, so nothing is ever blanked out.

on:
  push:
    branches:
      - claude/advanced-trading-bot-d5Lmw
      - main
    paths:
      - ".github/workflows/render-sync-secrets.yml"
      - ".github/scripts/render_sync_secrets.py"
      - "render.yaml"
      - "backend/render.yaml"
  workflow_dispatch: {}

concurrency:
  group: render-sync-secrets
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install httpx --quiet

      - name: Guard — Render secrets present?
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "::warning::RENDER_API_KEY / RENDER_SERVICE_ID not set — skipping."
            echo "SKIP=1" >> "$GITHUB_ENV"
          fi

      - name: Push LLM/Slack keys into Render runtime
        if: env.SKIP != '1'
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_WORKER_SERVICE_ID: ${{ secrets.RENDER_WORKER_SERVICE_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python .github/scripts/render_sync_secrets.py
