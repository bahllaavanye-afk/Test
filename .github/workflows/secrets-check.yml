name: Secrets & Config Health Check

# Verifies all required secrets are present and reports missing ones to Slack.
# Run this after adding secrets to confirm they're wired up correctly.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"     # Monday 8am UTC — weekly check

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check secrets
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          ANTHROPIC_API_KEY: "disabled"
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          python3 << 'PYEOF'
          import os, httpx

          REQUIRED = {
              "SLACK_BOT_TOKEN":     "Slack → api.slack.com → Your Apps → OAuth tokens",
              "RENDER_API_KEY":      "Render → Dashboard → Account Settings → API Keys",
              "RENDER_SERVICE_ID":   "Render → Service URL: dashboard.render.com/web/srv_XXXXXX",
              "ALPACA_API_KEY":      "Alpaca → app.alpaca.markets → API Keys",
              "ALPACA_SECRET_KEY":   "Alpaca → app.alpaca.markets → API Keys",
              "GOOGLE_CLIENT_ID":    "GCP → console.cloud.google.com → OAuth 2.0 Clients",
              "GOOGLE_CLIENT_SECRET":"GCP → console.cloud.google.com → OAuth 2.0 Clients",
          }

          missing = {}
          present = []
          for key, hint in REQUIRED.items():
              val = os.environ.get(key, "")
              if not val:
                  missing[key] = hint
              else:
                  present.append(key)

          print(f"✅ Present ({len(present)}): {', '.join(present)}")
          if missing:
              print(f"\n❌ Missing ({len(missing)}):")
              for k, hint in missing.items():
                  print(f"   {k}: {hint}")
          else:
              print("All required secrets are set!")

          # Post to Slack
          token = os.environ.get("SLACK_BOT_TOKEN", "")
          if not token:
              print("\nCannot post to Slack — SLACK_BOT_TOKEN missing")
              print("Add it at: github.com → Settings → Secrets and variables → Actions")
              exit(0)

          if missing:
              lines = ["⚠️ *Missing GitHub Secrets* — some features will be disabled\n"]
              for k, hint in missing.items():
                  lines.append(f"• `{k}`: {hint}")
              lines.append("\nAdd at: Settings → Secrets and variables → Actions → New repository secret")
              msg = "\n".join(lines)
              channel = "#infra-alerts"
          else:
              msg = f"✅ *All {len(present)} secrets configured* — QuantEdge fully operational"
              channel = "#engineering"

          httpx.post(
              "https://slack.com/api/chat.postMessage",
              headers={"Authorization": f"Bearer {token}"},
              json={"channel": channel, "text": msg, "mrkdwn": True},
              timeout=10,
          )
          PYEOF
