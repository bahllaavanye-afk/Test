name: Secrets Health Check — Run This First

on:
  workflow_dispatch:

jobs:
  check:
    name: Check which secrets are configured
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Check secrets availability
        run: |
          echo "## QuantEdge Secrets Health Check" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Run this workflow manually to see which secrets need to be added." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Secret | Status | Impact if Missing |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|--------|-------------------|" >> "$GITHUB_STEP_SUMMARY"

          check_secret() {
            local name=$1
            local value=$2
            local impact=$3
            if [ -n "$value" ]; then
              echo "| \`$name\` | ✅ Set | — |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| \`$name\` | ❌ Missing | $impact |" >> "$GITHUB_STEP_SUMMARY"
            fi
          }

          check_secret "SLACK_BOT_TOKEN"       "${{ secrets.SLACK_BOT_TOKEN }}"       "No Slack messages — all channels silent"
          check_secret "GROQ_API_KEY_1"        "${{ secrets.GROQ_API_KEY_1 }}"        "No LLM responses — agent discussions empty"
          check_secret "GEMINI_API_KEY_1"      "${{ secrets.GEMINI_API_KEY_1 }}"      "No ML training or Gemini discussions"
          check_secret "DEEPSEEK_API_KEY_1"    "${{ secrets.DEEPSEEK_API_KEY_1 }}"    "Reduced LLM fallback coverage"
          check_secret "DEEPSEEK_API_KEY_2"    "${{ secrets.DEEPSEEK_API_KEY_2 }}"    "Reduced LLM fallback coverage"
          check_secret "DEEPSEEK_API_KEY_3"    "${{ secrets.DEEPSEEK_API_KEY_3 }}"    "Reduced LLM fallback coverage"
          check_secret "SAMBANOVA_API_KEY_1"   "${{ secrets.SAMBANOVA_API_KEY_1 }}"   "Reduced LLM fallback coverage"
          check_secret "CEREBRAS_API_KEY_1"    "${{ secrets.CEREBRAS_API_KEY_1 }}"    "Reduced LLM fallback coverage"
          check_secret "HYPERBOLIC_API_KEY_1"  "${{ secrets.HYPERBOLIC_API_KEY_1 }}"  "Reduced LLM fallback coverage"
          check_secret "TOGETHER_API_KEY_1"    "${{ secrets.TOGETHER_API_KEY_1 }}"    "Reduced LLM fallback coverage"
          check_secret "ALPACA_API_KEY"        "${{ secrets.ALPACA_API_KEY }}"        "No paper trading orders placed"
          check_secret "ALPACA_SECRET_KEY"     "${{ secrets.ALPACA_SECRET_KEY }}"     "No paper trading orders placed"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## How to Add Missing Secrets" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Go to **Settings → Secrets and variables → Actions → New repository secret**" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Add secrets in this priority order:" >> "$GITHUB_STEP_SUMMARY"
          echo "   - \`GROQ_API_KEY_1\` → Free at [console.groq.com](https://console.groq.com) (12,500 req/day)" >> "$GITHUB_STEP_SUMMARY"
          echo "   - \`GEMINI_API_KEY_1\` → Free at [aistudio.google.com](https://aistudio.google.com)" >> "$GITHUB_STEP_SUMMARY"
          echo "   - \`SLACK_BOT_TOKEN\` → From [api.slack.com](https://api.slack.com) → Your App → OAuth → Bot Token" >> "$GITHUB_STEP_SUMMARY"
          echo "   - \`ALPACA_API_KEY\` + \`ALPACA_SECRET_KEY\` → From [alpaca.markets](https://alpaca.markets) (paper account)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Minimum for agents to talk to each other:** \`GROQ_API_KEY_1\` only" >> "$GITHUB_STEP_SUMMARY"
          echo "**Minimum for Slack activity:** \`GROQ_API_KEY_1\` + \`SLACK_BOT_TOKEN\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Minimum for trades:** all 4 above" >> "$GITHUB_STEP_SUMMARY"

      - name: Test Binance public API (no key needed)
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Live Data Sources (No Key Required)" >> "$GITHUB_STEP_SUMMARY"
          BINANCE=$(curl -s "https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT" | python3 -c "import json,sys; d=json.load(sys.stdin); print('BTC: \$'+d['price'])" 2>/dev/null || echo "FAILED")
          FUNDING=$(curl -s "https://fapi.binance.com/fapi/v1/premiumIndex?symbol=BTCUSDT" | python3 -c "import json,sys; d=json.load(sys.stdin); print('BTC funding: '+d['lastFundingRate'])" 2>/dev/null || echo "FAILED")
          echo "- Binance spot price: $BINANCE" >> "$GITHUB_STEP_SUMMARY"
          echo "- Binance funding rate: $FUNDING" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "✅ These data sources work without any API key — signals ARE being generated." >> "$GITHUB_STEP_SUMMARY"
