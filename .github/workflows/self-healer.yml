name: QuantEdge Self-Healer

# Monitors the whole codebase every 30 minutes.
# Detects and auto-fixes: failing tests, import errors, broken CI,
# outdated deps, type errors, missing __init__.py files, syntax errors.
# Posts all findings + fixes to #incidents and #engineering on Slack.

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:
    inputs:
      module:
        description: "Specific module to heal (leave empty for full scan)"
        required: false
        default: ""

concurrency:
  group: self-healer
  cancel-in-progress: false

jobs:
  heal:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      issues: write
      pull-requests: read
      actions: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: experiments/results/slack_state.json
          key: slack-state-${{ github.run_id }}
          restore-keys: |
            slack-state-

      - name: Install dependencies
        run: |
          pip install --quiet \
            pytest pytest-asyncio pytest-cov \
            httpx aiosqlite anyio \
            fastapi uvicorn "pydantic[email]" pydantic-settings email-validator \
            python-jose[cryptography] passlib[bcrypt] cryptography slowapi \
            sqlalchemy[asyncio] alembic \
            pandas numpy scipy statsmodels scikit-learn \
            structlog tenacity python-dotenv apscheduler \
            redis yfinance

      - name: Run self-healer
        env:
          SLACK_BOT_TOKEN:   ${{ secrets.SLACK_BOT_TOKEN }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          CEREBRAS_API_KEY:  ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          GEMINI_API_KEY_2:  ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3:  ${{ secrets.GEMINI_API_KEY_3 }}
          GROQ_API_KEY_1:    ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2:    ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3:    ${{ secrets.GROQ_API_KEY_3 }}
          GEMINI_API_KEY_1:  ${{ secrets.GEMINI_API_KEY_1 }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:           ${{ github.repository }}
          MODULE_FILTER:     ${{ inputs.module }}
          TRADING_MODE:      test
          DATABASE_URL:      sqlite+aiosqlite:///./test.db
          SECRET_KEY:        test-secret-key-32-bytes-xxxxxxxx
        run: |
          mkdir -p experiments/results
          python .github/scripts/self_healer.py

      - name: Commit auto-fixes
        run: |
          git config user.name  "QuantEdge Self-Healer"
          git config user.email "self-healer@quantedge.local"
          git add -A
          if git diff --cached --quiet; then
            echo "No fixes to commit."
          else
            git commit -m "fix(auto): self-healer applied $(git diff --cached --stat | tail -1) [skip ci]"
            git push origin HEAD
          fi

      - name: Save state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: experiments/results/slack_state.json
          key: slack-state-${{ github.run_id }}
