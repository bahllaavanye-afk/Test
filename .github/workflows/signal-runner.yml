name: Signal Runner — Every 5 Minutes (All Desks)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  signals:
    name: Run signals across all desks
    runs-on: ubuntu-latest
    timeout-minutes: 4
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/advanced-trading-bot-d5Lmw
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install --quiet requests yfinance

      - name: Configure git
        run: |
          git config user.email "signals@quantedge.ai"
          git config user.name "QuantEdge Signal Runner"

      - name: Run signal runner
        continue-on-error: true
        env:
          SLACK_BOT_TOKEN:    ${{ secrets.SLACK_BOT_TOKEN }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY_1 }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY_1 }}
          DEEPSEEK_API_KEY:   ${{ secrets.DEEPSEEK_API_KEY_1 }}
          DEEPSEEK_API_KEY_2: ${{ secrets.DEEPSEEK_API_KEY_2 }}
          DEEPSEEK_API_KEY_3: ${{ secrets.DEEPSEEK_API_KEY_3 }}
          SAMBANOVA_API_KEY:  ${{ secrets.SAMBANOVA_API_KEY_1 }}
          CEREBRAS_API_KEY:   ${{ secrets.CEREBRAS_API_KEY_1 }}
          HYPERBOLIC_API_KEY: ${{ secrets.HYPERBOLIC_API_KEY_1 }}
          TOGETHER_API_KEY:   ${{ secrets.TOGETHER_API_KEY_1 }}
          ALLOW_PAID_APIS:    "False"
        run: python .github/scripts/signal_runner.py

      - name: Commit updated signals
        continue-on-error: true
        run: |
          git add .github/state/agent_memory.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "signals: $(date -u +%H:%M) | $(python3 -c 'import json; d=json.load(open("/tmp/signal_runner_summary.json")); print(str(d.get(\"signals\",0))+\" signals across \"+\",\".join(d.get(\"by_desk\",{}).keys()))' 2>/dev/null || echo '?')"

      - name: Push
        continue-on-error: true
        run: |
          for i in 1 2 3 4; do
            git pull --rebase --quiet origin claude/advanced-trading-bot-d5Lmw && break || sleep $((i*2))
          done
          git push -u origin claude/advanced-trading-bot-d5Lmw || true

      - name: Post step summary
        if: always()
        run: |
          echo "## Signal Runner — $(date -u)" >> "$GITHUB_STEP_SUMMARY"
          if [ -f /tmp/signal_runner_summary.json ]; then
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/signal_runner_summary.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
