name: Slack Agent Team — real engineering work, real reports

# Each run wakes 6-15 agents. Each agent reads actual repo state — git log,
# strategy files, test counts, backtest JSONs, open PRs, workflow runs —
# and posts findings to relevant channels with their own identity.
#
# Key improvements:
# - State dedup: each agent caches post hashes to avoid repeating messages.
# - Thread responses: agents read Slack threads and respond to human replies.
# - Claude coding agent: ANTHROPIC_API_KEY enables intelligent AI responses.
#
# Two ways to run:
#   1) Scheduled: 4x/day (09:15, 13:15, 17:15, 21:15 UTC). Needs SLACK_BOT_TOKEN secret.
#   2) Manual:    Actions tab → this workflow → Run workflow.
on:
  schedule:
    - cron: "15 9,13,17,21 * * *"
  workflow_dispatch:
    inputs:
      bot_token:
        description: "Slack Bot User OAuth Token (xoxb-...). Leave blank to use repo secret SLACK_BOT_TOKEN."
        required: false
        type: string

concurrency:
  group: slack-agent-team
  cancel-in-progress: false

jobs:
  agents:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write          # QA agent auto-creates tracking issues for untested strategies
      pull-requests: read
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # agents read full git log

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Restore dedup state from previous run so agents don't repeat themselves
      - name: Restore agent state cache
        uses: actions/cache@v4
        with:
          path: experiments/results/slack_state.json
          key: slack-state-${{ github.run_id }}
          restore-keys: |
            slack-state-

      - name: Install lightweight test dependencies
        run: |
          pip install --quiet \
            pytest pytest-asyncio pytest-cov \
            httpx aiosqlite \
            fastapi uvicorn "pydantic[email]" pydantic-settings email-validator \
            python-jose[cryptography] passlib[bcrypt] cryptography slowapi \
            sqlalchemy[asyncio] alembic \
            pandas numpy scipy statsmodels scikit-learn \
            structlog tenacity python-dotenv anyio apscheduler \
            redis

      - name: Run agent team
        env:
          SLACK_BOT_TOKEN: ${{ inputs.bot_token || secrets.SLACK_BOT_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL: ${{ secrets.ALPACA_BASE_URL || 'https://paper-api.alpaca.markets' }}
          # Claude coding agent — gives employees AI-powered responses to questions
          # Add ANTHROPIC_API_KEY at: Settings → Secrets → New repository secret
          # Without it: agents still work but give rule-based thread responses
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$SLACK_BOT_TOKEN" ]; then
            echo ""
            echo "╔══════════════════════════════════════════════════════════════════╗"
            echo "║  ⚠  SLACK SILENT — agents ran but NO messages were posted       ║"
            echo "║                                                                  ║"
            echo "║  Add SLACK_BOT_TOKEN to repo secrets:                           ║"
            echo "║  Settings → Secrets and variables → Actions → New secret        ║"
            echo "╚══════════════════════════════════════════════════════════════════╝"
            echo ""
            exit 0
          fi
          mkdir -p experiments/results
          python .github/scripts/slack_agent_team.py

      # Persist state for next run (dedup hashes + replied-to thread timestamps)
      - name: Save agent state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: experiments/results/slack_state.json
          key: slack-state-${{ github.run_id }}
