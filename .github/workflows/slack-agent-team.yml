name: Slack Agent Team — real engineering work, real reports

# Each run wakes 6-15 agents. Each agent reads actual repo state — git log,
# strategy files, test counts, backtest JSONs, open PRs, workflow runs —
# and posts findings to relevant channels with their own identity.
#
# Key improvements:
# - State dedup: each agent caches post hashes to avoid repeating messages.
# - Thread responses: agents read Slack threads and respond to human replies.
# - Claude coding agent: ANTHROPIC_API_KEY enables intelligent AI responses.
#
# Two ways to run:
#   1) Scheduled: 4x/day (09:15, 13:15, 17:15, 21:15 UTC). Needs SLACK_BOT_TOKEN secret.
#   2) Manual:    Actions tab → this workflow → Run workflow.
on:
  schedule:
    - cron: "15 9,13,17,21 * * *"
  workflow_dispatch:
    inputs:
      bot_token:
        description: "Slack Bot User OAuth Token (xoxb-...). Leave blank to use repo secret SLACK_BOT_TOKEN."
        required: false
        type: string

concurrency:
  group: slack-agent-team
  cancel-in-progress: false

jobs:
  agents:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write          # QA agent auto-creates tracking issues for untested strategies
      pull-requests: read
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # agents read full git log

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Restore dedup state from previous run so agents don't repeat themselves
      - name: Restore agent state cache
        uses: actions/cache@v4
        with:
          path: experiments/results/slack_state.json
          key: slack-state-${{ github.run_id }}
          restore-keys: |
            slack-state-

      - name: Install lightweight test dependencies
        run: |
          pip install --quiet \
            pytest pytest-asyncio pytest-cov \
            httpx aiosqlite \
            fastapi uvicorn "pydantic[email]" pydantic-settings email-validator \
            python-jose[cryptography] passlib[bcrypt] cryptography slowapi \
            sqlalchemy[asyncio] alembic \
            pandas numpy scipy statsmodels scikit-learn \
            structlog tenacity python-dotenv anyio apscheduler \
            redis

      - name: Run agent team
        env:
          SLACK_BOT_TOKEN: ${{ inputs.bot_token || secrets.SLACK_BOT_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL: ${{ secrets.ALPACA_BASE_URL || 'https://paper-api.alpaca.markets' }}
          # ── Shared primary keys (fallback pool) ──────────────────────────
          # ALLOW_PAID_APIS=False in code — Anthropic key present but NEVER called.
          # Zero-spend policy enforced at the code level, not just here.
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY:  ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # ── Numbered accounts (_1 is an alias for the primary, _2 _3 are separate) ──
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GROQ_API_KEY_4: ${{ secrets.GROQ_API_KEY_4 }}
          GROQ_API_KEY_5: ${{ secrets.GROQ_API_KEY_5 }}
          GROQ_API_KEY_6: ${{ secrets.GROQ_API_KEY_6 }}
          GROQ_API_KEY_7: ${{ secrets.GROQ_API_KEY_7 }}
          GROQ_API_KEY_8: ${{ secrets.GROQ_API_KEY_8 }}
          GROQ_API_KEY_9: ${{ secrets.GROQ_API_KEY_9 }}
          GROQ_API_KEY_10: ${{ secrets.GROQ_API_KEY_10 }}
          CEREBRAS_API_KEY_2: ${{ secrets.CEREBRAS_API_KEY_2 }}
          CEREBRAS_API_KEY_3: ${{ secrets.CEREBRAS_API_KEY_3 }}
          GEMINI_API_KEY_2:  ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3:  ${{ secrets.GEMINI_API_KEY_3 }}
          # 3 Gemini accounts × 1500 req/day = 4500 req/day combined
          OPENROUTER_API_KEY_2: ${{ secrets.OPENROUTER_API_KEY_2 }}
          OPENROUTER_API_KEY_3: ${{ secrets.OPENROUTER_API_KEY_3 }}
          # ── BACKUP_ pool (alternative naming also supported) ─────────────
          GROQ_API_KEY_BACKUP_1: ${{ secrets.GROQ_API_KEY_BACKUP_1 }}
          GROQ_API_KEY_BACKUP_2: ${{ secrets.GROQ_API_KEY_BACKUP_2 }}
          GROQ_API_KEY_BACKUP_3: ${{ secrets.GROQ_API_KEY_BACKUP_3 }}
          GROQ_API_KEY_BACKUP_4: ${{ secrets.GROQ_API_KEY_BACKUP_4 }}
          GROQ_API_KEY_BACKUP_5: ${{ secrets.GROQ_API_KEY_BACKUP_5 }}
          CEREBRAS_API_KEY_BACKUP_1: ${{ secrets.CEREBRAS_API_KEY_BACKUP_1 }}
          CEREBRAS_API_KEY_BACKUP_2: ${{ secrets.CEREBRAS_API_KEY_BACKUP_2 }}
          CEREBRAS_API_KEY_BACKUP_3: ${{ secrets.CEREBRAS_API_KEY_BACKUP_3 }}
          GEMINI_API_KEY_BACKUP_1: ${{ secrets.GEMINI_API_KEY_BACKUP_1 }}
          GEMINI_API_KEY_BACKUP_2: ${{ secrets.GEMINI_API_KEY_BACKUP_2 }}
          GEMINI_API_KEY_BACKUP_3: ${{ secrets.GEMINI_API_KEY_BACKUP_3 }}
          OPENROUTER_API_KEY_BACKUP_1: ${{ secrets.OPENROUTER_API_KEY_BACKUP_1 }}
          OPENROUTER_API_KEY_BACKUP_2: ${{ secrets.OPENROUTER_API_KEY_BACKUP_2 }}
          # ── Per-employee dedicated keys (each employee = independent rate limit) ──
          # Create free accounts at: groq.com | cloud.cerebras.ai | ai.google.dev | openrouter.ai
          GROQ_API_KEY_MAYA:   ${{ secrets.GROQ_API_KEY_MAYA }}
          GROQ_API_KEY_AARAV:  ${{ secrets.GROQ_API_KEY_AARAV }}
          GROQ_API_KEY_LINH:   ${{ secrets.GROQ_API_KEY_LINH }}
          GROQ_API_KEY_JIAN:   ${{ secrets.GROQ_API_KEY_JIAN }}
          GROQ_API_KEY_ANNA:   ${{ secrets.GROQ_API_KEY_ANNA }}
          GROQ_API_KEY_ADITI:  ${{ secrets.GROQ_API_KEY_ADITI }}
          GROQ_API_KEY_KENJI:  ${{ secrets.GROQ_API_KEY_KENJI }}
          GROQ_API_KEY_DIEGO:  ${{ secrets.GROQ_API_KEY_DIEGO }}
          GROQ_API_KEY_LIOR:   ${{ secrets.GROQ_API_KEY_LIOR }}
          GROQ_API_KEY_SARA:   ${{ secrets.GROQ_API_KEY_SARA }}
          GROQ_API_KEY_SOFIA:  ${{ secrets.GROQ_API_KEY_SOFIA }}
          GROQ_API_KEY_HUGO:   ${{ secrets.GROQ_API_KEY_HUGO }}
          GROQ_API_KEY_MARCUS: ${{ secrets.GROQ_API_KEY_MARCUS }}
          CEREBRAS_API_KEY_MAYA:   ${{ secrets.CEREBRAS_API_KEY_MAYA }}
          CEREBRAS_API_KEY_AARAV:  ${{ secrets.CEREBRAS_API_KEY_AARAV }}
          CEREBRAS_API_KEY_LINH:   ${{ secrets.CEREBRAS_API_KEY_LINH }}
          CEREBRAS_API_KEY_JIAN:   ${{ secrets.CEREBRAS_API_KEY_JIAN }}
          CEREBRAS_API_KEY_ANNA:   ${{ secrets.CEREBRAS_API_KEY_ANNA }}
          CEREBRAS_API_KEY_ADITI:  ${{ secrets.CEREBRAS_API_KEY_ADITI }}
          CEREBRAS_API_KEY_KENJI:  ${{ secrets.CEREBRAS_API_KEY_KENJI }}
          CEREBRAS_API_KEY_DIEGO:  ${{ secrets.CEREBRAS_API_KEY_DIEGO }}
          CEREBRAS_API_KEY_LIOR:   ${{ secrets.CEREBRAS_API_KEY_LIOR }}
          CEREBRAS_API_KEY_SARA:   ${{ secrets.CEREBRAS_API_KEY_SARA }}
          CEREBRAS_API_KEY_SOFIA:  ${{ secrets.CEREBRAS_API_KEY_SOFIA }}
          CEREBRAS_API_KEY_HUGO:   ${{ secrets.CEREBRAS_API_KEY_HUGO }}
          CEREBRAS_API_KEY_MARCUS: ${{ secrets.CEREBRAS_API_KEY_MARCUS }}
          GEMINI_API_KEY_MAYA:   ${{ secrets.GEMINI_API_KEY_MAYA }}
          GEMINI_API_KEY_AARAV:  ${{ secrets.GEMINI_API_KEY_AARAV }}
          GEMINI_API_KEY_LINH:   ${{ secrets.GEMINI_API_KEY_LINH }}
          GEMINI_API_KEY_JIAN:   ${{ secrets.GEMINI_API_KEY_JIAN }}
          GEMINI_API_KEY_ANNA:   ${{ secrets.GEMINI_API_KEY_ANNA }}
          GEMINI_API_KEY_ADITI:  ${{ secrets.GEMINI_API_KEY_ADITI }}
          GEMINI_API_KEY_KENJI:  ${{ secrets.GEMINI_API_KEY_KENJI }}
          GEMINI_API_KEY_DIEGO:  ${{ secrets.GEMINI_API_KEY_DIEGO }}
          GEMINI_API_KEY_LIOR:   ${{ secrets.GEMINI_API_KEY_LIOR }}
          GEMINI_API_KEY_SARA:   ${{ secrets.GEMINI_API_KEY_SARA }}
          GEMINI_API_KEY_SOFIA:  ${{ secrets.GEMINI_API_KEY_SOFIA }}
          GEMINI_API_KEY_HUGO:   ${{ secrets.GEMINI_API_KEY_HUGO }}
          GEMINI_API_KEY_MARCUS: ${{ secrets.GEMINI_API_KEY_MARCUS }}
          OPENROUTER_API_KEY_MAYA:   ${{ secrets.OPENROUTER_API_KEY_MAYA }}
          OPENROUTER_API_KEY_AARAV:  ${{ secrets.OPENROUTER_API_KEY_AARAV }}
          OPENROUTER_API_KEY_LINH:   ${{ secrets.OPENROUTER_API_KEY_LINH }}
          OPENROUTER_API_KEY_JIAN:   ${{ secrets.OPENROUTER_API_KEY_JIAN }}
          OPENROUTER_API_KEY_ANNA:   ${{ secrets.OPENROUTER_API_KEY_ANNA }}
          OPENROUTER_API_KEY_ADITI:  ${{ secrets.OPENROUTER_API_KEY_ADITI }}
          OPENROUTER_API_KEY_KENJI:  ${{ secrets.OPENROUTER_API_KEY_KENJI }}
          OPENROUTER_API_KEY_DIEGO:  ${{ secrets.OPENROUTER_API_KEY_DIEGO }}
          OPENROUTER_API_KEY_LIOR:   ${{ secrets.OPENROUTER_API_KEY_LIOR }}
          OPENROUTER_API_KEY_SARA:   ${{ secrets.OPENROUTER_API_KEY_SARA }}
          OPENROUTER_API_KEY_SOFIA:  ${{ secrets.OPENROUTER_API_KEY_SOFIA }}
          OPENROUTER_API_KEY_HUGO:   ${{ secrets.OPENROUTER_API_KEY_HUGO }}
          OPENROUTER_API_KEY_MARCUS: ${{ secrets.OPENROUTER_API_KEY_MARCUS }}
        run: |
          if [ -z "$SLACK_BOT_TOKEN" ]; then
            echo ""
            echo "╔══════════════════════════════════════════════════════════════════╗"
            echo "║  ⚠  SLACK SILENT — agents ran but NO messages were posted       ║"
            echo "║                                                                  ║"
            echo "║  Add SLACK_BOT_TOKEN to repo secrets:                           ║"
            echo "║  Settings → Secrets and variables → Actions → New secret        ║"
            echo "╚══════════════════════════════════════════════════════════════════╝"
            echo ""
            exit 0
          fi
          mkdir -p experiments/results
          python .github/scripts/slack_agent_team.py

      # Persist state for next run (dedup hashes + replied-to thread timestamps)
      - name: Save agent state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: experiments/results/slack_state.json
          key: slack-state-${{ github.run_id }}
