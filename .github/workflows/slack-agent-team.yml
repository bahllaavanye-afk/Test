name: Slack Agent Team — real engineering work, real reports

# Each run wakes 6-15 agents. Each agent reads actual repo state — git log,
# strategy files, test counts, backtest JSONs, open PRs, workflow runs —
# and posts findings to relevant channels with their own identity (custom
# username + emoji avatar). Some agents reply in threads to others.
#
# Two ways to run:
#   1) Scheduled: 4x/day (09:15, 13:15, 17:15, 21:15 UTC). Needs SLACK_BOT_TOKEN secret.
#   2) Manual:    Actions tab → this workflow → Run workflow, paste a token.
on:
  schedule:
    - cron: "15 * * * *"
  workflow_dispatch:
    inputs:
      bot_token:
        description: "Slack Bot User OAuth Token (xoxb-...). Leave blank to use repo secret SLACK_BOT_TOKEN."
        required: false
        type: string

concurrency:
  group: slack-agent-team
  cancel-in-progress: false

jobs:
  agents:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 20
    permissions:
      contents: write
      issues: write          # QA agent auto-creates tracking issues for untested strategies
      pull-requests: read
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0   # agents read full git log
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install lightweight test dependencies
        # Only the packages needed for unit tests (no ML models, no brokers).
        # This enables Aditi + Ravi agents to run real pytest and report live pass/fail.
        run: |
          pip install --quiet \
            pytest pytest-asyncio pytest-cov \
            httpx aiosqlite \
            fastapi uvicorn pydantic pydantic-settings \
            python-jose[cryptography] passlib[bcrypt] cryptography slowapi \
            sqlalchemy[asyncio] alembic \
            pandas numpy scipy statsmodels scikit-learn \
            structlog tenacity python-dotenv anyio apscheduler \
            redis
          # Free LLM providers + observability (graceful — agents still run if any fail)
          pip install --quiet litellm langfuse google-generativeai groq || true
          pip install --quiet cerebras-cloud-sdk || true
      - name: Run agent team
        env:
          SLACK_BOT_TOKEN: ${{ inputs.bot_token || secrets.SLACK_BOT_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          # Alpaca paper-trading credentials — enables real account/P&L reporting
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL: ${{ secrets.ALPACA_BASE_URL || 'https://paper-api.alpaca.markets' }}
          # Free LLM API keys — primary cascade for all 47 agents
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY_1 }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY_1 }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY_1 }}
          DEEPSEEK_API_KEY:   ${{ secrets.DEEPSEEK_API_KEY_1 }}
          DEEPSEEK_API_KEY_2: ${{ secrets.DEEPSEEK_API_KEY_2 }}
          DEEPSEEK_API_KEY_3: ${{ secrets.DEEPSEEK_API_KEY_3 }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # Langfuse observability — traces every LLM call (50k free/month)
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST || 'https://cloud.langfuse.com' }}
          # Zero-spend policy — NEVER change to True
          ALLOW_PAID_APIS: "False"
        run: |
          if [ -z "$SLACK_BOT_TOKEN" ]; then
            echo ""
            echo "╔══════════════════════════════════════════════════════════════════╗"
            echo "║  ⚠  SLACK SILENT — agents ran but NO messages were posted       ║"
            echo "║                                                                  ║"
            echo "║  Add SLACK_BOT_TOKEN to repo secrets:                           ║"
            echo "║  Settings → Secrets and variables → Actions → New secret        ║"
            echo "╚══════════════════════════════════════════════════════════════════╝"
            echo ""
            exit 0
          fi
          python .github/scripts/slack_agent_team.py
      - name: Push changes
        continue-on-error: true
        run: |
          git config user.email "agents@quantedge.ai"
          git config user.name "QuantEdge Agent Team"
          STATE_DIR=".github/state"
          if [ -d "$STATE_DIR" ] && [ -n "$(ls -A $STATE_DIR)" ]; then
            git add "$STATE_DIR"
            git diff --cached --quiet || git commit -m "chore: persist agent state [skip ci]"
            git stash --include-untracked --quiet || true
            for i in 1 2 3 4; do
              git pull --rebase --quiet origin claude/advanced-trading-bot-d5Lmw && break || sleep $((i*2))
            done
            git stash pop --quiet || true
            git push -u origin claude/advanced-trading-bot-d5Lmw || true
          fi
