name: Slack Auto-Review Loop (Every 5 min)

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes, 24/7
  workflow_dispatch:

concurrency:
  group: slack-review-loop
  cancel-in-progress: true   # if previous run still going, skip it

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  review:
    name: Review Slack Messages & Respond
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/advanced-trading-bot-d5Lmw

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install uv --quiet && uv pip install --system 'requests>=2.32.0'

      - name: Configure git
        run: |
          git config user.email "agents@quantedge.ai"
          git config user.name "QuantEdge Agent Team"

      - name: Run Slack review loop
        env:
          ANTHROPIC_API_KEY: "disabled"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          HYPERBOLIC_API_KEY: ${{ secrets.HYPERBOLIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          ALLOW_PAID_APIS: "False"
        run: python .github/scripts/slack_review_loop.py

      - name: Persist review state
        continue-on-error: true
        run: |
          STATE=".github/state/slack_review_state.json"
          if [ -f "$STATE" ]; then
            git add "$STATE"
            git diff --cached --quiet || git commit -m "chore: persist slack-review state [skip ci]"
            for i in 1 2 3 4; do
              git pull --rebase --quiet origin claude/advanced-trading-bot-d5Lmw && break || sleep $((i*2))
            done
            git push -u origin claude/advanced-trading-bot-d5Lmw || true
          fi
