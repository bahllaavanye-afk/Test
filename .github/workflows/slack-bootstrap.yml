name: Slack Bootstrap — create all 31 channels

# Run from the Actions tab → Slack Bootstrap → Run workflow.
# Paste your Bot User OAuth Token (xoxb-...) once; this creates all
# 31 engineering-org channels in your workspace.
#
# Required Slack App OAuth scopes:
#   channels:manage  channels:read  groups:write  groups:read
#   chat:write       channels:join
on:
  workflow_dispatch:
    inputs:
      bot_token:
        description: "Slack Bot User OAuth Token (xoxb-...). Rotate after this run."
        required: true
        type: string

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Create all channels
        env:
          SLACK_BOT_TOKEN: ${{ inputs.bot_token }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: python .github/scripts/slack_bootstrap.py
