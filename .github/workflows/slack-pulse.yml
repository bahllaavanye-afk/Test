name: Slack Pulse — Keep Team Informed

# Posts deploy notifications, daily P&L, and system status to Slack.
# Fires on every push to main branch + scheduled daily briefings.

on:
  push:
    branches: [claude/advanced-trading-bot-d5Lmw, main]
    # Ignore automated state-persist commits — they have [skip ci] in the message
    # but also explicitly filter to code changes only to be safe
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/scripts/*.py"
      - ".github/workflows/*.yml"
  schedule:
    - cron: "0 * * * *"       # Hourly, 24/7 — no downtime
  workflow_dispatch:

concurrency:
  group: slack-pulse-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/advanced-trading-bot-d5Lmw
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install --quiet anthropic
          # Free LLM providers + observability
          pip install --quiet litellm langfuse google-generativeai groq || true
          pip install --quiet cerebras-cloud-sdk || true

      - name: Post to Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_ACTOR: ${{ github.actor }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          # Free LLM API keys
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # Langfuse observability
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST || 'https://cloud.langfuse.com' }}
          ALLOW_PAID_APIS: "False"
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # Push: quick mode handles event-specific deploy notifications dynamically
            python .github/scripts/slack_agent_team.py quick
          else
            # Scheduled briefing: full agent run generates dynamic content from live data
            python .github/scripts/slack_agent_team.py
          fi
      - name: Persist agent state
        if: always()
        run: |
          git config user.email "agents@quantedge.ai"
          git config user.name "QuantEdge Agent Team"
          STATE_FILE="experiments/results/slack_state.json"
          if [ -f "$STATE_FILE" ] && ! git diff --quiet "$STATE_FILE" 2>/dev/null; then
            git add "$STATE_FILE"
            git commit -m "chore: persist agent state [skip ci]"
            git push origin HEAD:claude/advanced-trading-bot-d5Lmw || true
          fi
