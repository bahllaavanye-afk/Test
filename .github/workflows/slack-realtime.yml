name: QuantEdge Slack Real-Time Responder

# Runs every 15 minutes — handles thread replies, /commands, and incidents.
# Also fires instantly on push and pull_request events.
# Uses multi-agent cascade: Groq → GitHub Models → Gemini → Claude Haiku
# (cheapest capable model first; Claude Sonnet never called here)

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes, 24/7
  push:
    branches:
      - main
      - claude/advanced-trading-bot-d5Lmw
  pull_request:
    types: [opened, ready_for_review, review_requested, synchronize]
  workflow_dispatch:

concurrency:
  group: slack-realtime-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false   # don't cancel — every run handles a different inbox snapshot

jobs:
  respond:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
      pull-requests: read
      actions: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: experiments/results/slack_state.json
          key: slack-state-${{ github.run_id }}
          restore-keys: |
            slack-state-

      - name: Install deps
        run: pip install --quiet httpx

      - name: Run real-time responder (quick mode)
        env:
          SLACK_BOT_TOKEN:   ${{ secrets.SLACK_BOT_TOKEN }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          CEREBRAS_API_KEY:  ${{ secrets.CEREBRAS_API_KEY }}
          # 3 Gemini accounts rotate automatically (1500 req/day each = 4500 combined)
          GEMINI_API_KEY_2:  ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3:  ${{ secrets.GEMINI_API_KEY_3 }}
          GROQ_API_KEY_1:    ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2:    ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3:    ${{ secrets.GROQ_API_KEY_3 }}
          GEMINI_API_KEY_1:  ${{ secrets.GEMINI_API_KEY_1 }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:           ${{ github.repository }}
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL:   ${{ secrets.ALPACA_BASE_URL || 'https://paper-api.alpaca.markets' }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ -z "$SLACK_BOT_TOKEN" ]; then
            echo "SLACK_BOT_TOKEN not set — skipping"
            exit 0
          fi
          mkdir -p experiments/results
          python .github/scripts/slack_agent_team.py quick

      - name: Save state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: experiments/results/slack_state.json
          key: slack-state-${{ github.run_id }}
