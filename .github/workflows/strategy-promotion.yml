name: Strategy Promotion Pipeline

on:
  schedule:
    - cron: "0 9 * * *"   # 9 AM UTC daily
  workflow_dispatch:

concurrency:
  group: strategy-promotion
  cancel-in-progress: true

jobs:
  promote:
    name: Evaluate Strategy Promotions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/advanced-trading-bot-d5Lmw
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install uv --quiet && uv pip install --system 'requests>=2.32.0'

      - name: Run strategy promotion check
        env:
          ANTHROPIC_API_KEY: "disabled"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          HYPERBOLIC_API_KEY: ${{ secrets.HYPERBOLIC_API_KEY }}
          NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
          NVIDIA_AGENTS_API_KEYS: ${{ secrets.NVIDIA_AGENTS_API_KEYS }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          ALLOW_PAID_APIS: "False"
        run: python .github/scripts/strategy_promotion.py

      - name: Commit promotions state
        run: |
          git config user.email "bot@quantedge.ai"
          git config user.name "QuantEdge Strategy Promoter"
          git add .github/state/strategy_promotions.json .github/state/company_brain.json || true
          git diff --cached --quiet || git commit -m "chore: strategy promotion state $(date -u +%Y-%m-%d)"
          git push origin claude/advanced-trading-bot-d5Lmw || true
