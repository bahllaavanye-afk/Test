name: Team Lead Issue Generator — All Teams

on:
  schedule:
    - cron: "0 * * * *"   # Hourly — team leads file issues continuously
    # Every day at 07:00 UTC — team leads file issues before stand-up
  workflow_dispatch:
    inputs:
      team:
        description: "Single team to run (leave empty for all)"
        required: false
        default: ""
      dry_run:
        description: "Dry run — generate but don't create issues"
        required: false
        default: "false"

jobs:
  generate-issues:
    name: AI Team Leads file issues for their teams
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/advanced-trading-bot-d5Lmw
          fetch-depth: 5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run team lead issue generator
        continue-on-error: true
        env:
          GH_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:          ${{ github.repository }}
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY_1 }}
          GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY_1 }}
          DEEPSEEK_API_KEY:  ${{ secrets.DEEPSEEK_API_KEY_1 }}
          DEEPSEEK_API_KEY_2: ${{ secrets.DEEPSEEK_API_KEY_2 }}
          DEEPSEEK_API_KEY_3: ${{ secrets.DEEPSEEK_API_KEY_3 }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_API_KEY_2: ${{ secrets.OPENROUTER_API_KEY_2 }}
          SLACK_BOT_TOKEN:  ${{ secrets.SLACK_BOT_TOKEN }}
          PYTHONPATH:       ${{ github.workspace }}/backend
          DRY_RUN:          ${{ github.event.inputs.dry_run || 'false' }}
          TEAM_FILTER:      ${{ github.event.inputs.team || '' }}
        run: |
          ARGS=""
          if [ -n "$TEAM_FILTER" ]; then
            ARGS="--team $TEAM_FILTER"
          fi
          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python .github/scripts/team_lead_issues.py $ARGS

      - name: Post results to GitHub step summary
        if: always()
        run: |
          echo "## Team Lead Issue Generator Results" >> "$GITHUB_STEP_SUMMARY"
          echo "Ran at: $(date -u)" >> "$GITHUB_STEP_SUMMARY"
