name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  UV_SYSTEM_PYTHON: "1"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install uv
        run: pip install uv==0.5.6

      # CI-only dep list — fast install (<60s), no heavy ML libs (torch, ray, mlflow,
      # lightning, vectorbt, shap). Those are exercised in dedicated notebook/job
      # runs on GPU runners, not in unit-test CI.
      - name: Install runtime + test deps
        # Note: pandas-ta omitted — the project uses a pure-pandas shim
        # (app/ml/features/pandas_ta_compat.py), so the upstream package isn't needed.
        run: |
          uv pip install \
            'fastapi>=0.115.0' 'uvicorn[standard]>=0.32.0' 'websockets>=13.0' \
            'python-multipart>=0.0.12' 'slowapi>=0.1.9' \
            'sqlalchemy[asyncio]>=2.0.36' 'asyncpg>=0.30.0' 'alembic>=1.14.0' \
            'aiosqlite>=0.19.0' 'redis>=5.2.0' 'httpx>=0.27.2' \
            'pydantic>=2.10.0' 'pydantic-settings>=2.6.0' \
            'python-jose[cryptography]>=3.3.0' 'passlib[bcrypt]>=1.7.4' \
            'cryptography>=43.0.0' 'bcrypt==4.0.1' \
            'numpy>=1.26.0' 'pandas>=2.2.0' 'scipy>=1.14.0' \
            'scikit-learn>=1.5.0' 'statsmodels>=0.14.0' \
            'structlog>=24.4.0' 'tenacity>=9.0.0' 'python-dotenv>=1.0.1' \
            'aiohttp>=3.11.0' 'anyio>=4.7.0' 'apscheduler>=3.10.4' \
            'pytest>=8.3.0' 'pytest-asyncio>=0.24.0' 'pytest-xdist>=3.6.0' \
            'pytest-timeout>=2.3.0'

      - name: Debug — env + collect
        env:
          PYTHONPATH: "."
          SECRET_KEY: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2"
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"
          ALEMBIC_DATABASE_URL: "sqlite:///./test.db"
          REDIS_URL: ""
          TRADING_MODE: "test"
          ALPACA_API_KEY: "test"
          ALPACA_SECRET_KEY: "test"
          ALPACA_BASE_URL: "https://paper-api.alpaca.markets"
        run: |
          echo "=== Python info ==="
          python --version
          echo "=== Installed packages (top 50) ==="
          pip list --format=columns | head -60
          echo "=== Try importing app.main ==="
          python -c "from app.main import app; print(f'app.main OK with {len(app.routes)} routes')" || echo "app.main import FAILED"
          echo "=== Test collection ==="
          pytest tests/ --collect-only -q \
            --ignore=tests/unit/test_ml_models.py \
            --ignore=tests/unit/test_a3c_lstm.py 2>&1 | tail -30

      - name: Run tests in parallel
        env:
          PYTHONPATH: "."
          SECRET_KEY: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2"
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"
          ALEMBIC_DATABASE_URL: "sqlite:///./test.db"
          REDIS_URL: ""
          TRADING_MODE: "test"
          ALPACA_API_KEY: "test"
          ALPACA_SECRET_KEY: "test"
          ALPACA_BASE_URL: "https://paper-api.alpaca.markets"
        run: |
          pytest tests/ \
            -n auto --dist loadfile \
            --timeout=60 \
            --tb=short \
            --color=yes \
            --ignore=tests/unit/test_ml_models.py \
            --ignore=tests/unit/test_a3c_lstm.py \
            -p no:cacheprovider
