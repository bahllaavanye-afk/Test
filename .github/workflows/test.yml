name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Cancel old runs of this workflow on the same ref when a new one starts
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  UV_SYSTEM_PYTHON: "1"

jobs:
  # Fast lint/typecheck: gives signal in <30s, doesn't wait for full install
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install ruff
        run: pip install ruff==0.7.4
      - name: Lint backend
        run: ruff check backend/app --select=E9,F63,F7,F82 --exit-zero

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # Cache compiled wheel-house, not pip — much faster than pip cache
          cache: "pip"
          cache-dependency-path: "backend/pyproject.toml"

      - name: Install uv (10x faster than pip)
        run: pip install uv==0.5.6

      - name: Install backend in editable mode
        # Reads pyproject.toml dependencies — never drifts from production
        run: uv pip install -e ".[dev]" pytest-xdist pytest-timeout

      - name: Run tests in parallel
        env:
          # 64-char hex — passes the SECRET_KEY length validator
          SECRET_KEY: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2"
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"
          ALEMBIC_DATABASE_URL: "sqlite:///./test.db"
          REDIS_URL: ""
          TRADING_MODE: "test"
          ALPACA_API_KEY: "test"
          ALPACA_SECRET_KEY: "test"
          ALPACA_BASE_URL: "https://paper-api.alpaca.markets"
        # -n auto         → fan out across all CPU cores (~4× speedup)
        # --dist loadfile → group tests from same file on one worker (DB-safe)
        # --timeout=60    → kill any test that hangs
        # --tb=short      → readable failure output
        # No `-x`         → see ALL failures in one run, not just the first
        run: |
          pytest tests/ \
            -n auto --dist loadfile \
            --timeout=60 \
            --tb=short \
            --color=yes
