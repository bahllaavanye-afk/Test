name: Token Usage Monitor — Every 15 Minutes

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    name: Post token usage to Slack
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install --quiet requests

      - name: Configure git
        run: |
          git config user.email "monitor@quantedge.ai"
          git config user.name "Token Monitor"

      - name: Run token usage monitor
        continue-on-error: true
        env:
          SLACK_BOT_TOKEN:    ${{ secrets.SLACK_BOT_TOKEN }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY_1 }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY_1 }}
          DEEPSEEK_API_KEY:   ${{ secrets.DEEPSEEK_API_KEY_1 }}
          DEEPSEEK_API_KEY_2: ${{ secrets.DEEPSEEK_API_KEY_2 }}
          DEEPSEEK_API_KEY_3: ${{ secrets.DEEPSEEK_API_KEY_3 }}
          CEREBRAS_API_KEY:   ${{ secrets.CEREBRAS_API_KEY_1 }}
          SAMBANOVA_API_KEY:  ${{ secrets.SAMBANOVA_API_KEY_1 }}
          GH_TOKEN:           ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:            ${{ github.repository }}
          ALLOW_PAID_APIS:    "False"
        run: python .github/scripts/token_usage_monitor.py
