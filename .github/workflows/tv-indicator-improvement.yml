name: TV Indicator SOTA Improvement (Agent Pool)

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours — pool of free agents improve indicators
  workflow_dispatch:

concurrency:
  group: tv-indicator-improve
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  improve:
    name: Upgrade TV Indicators to SOTA
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install uv --quiet && uv pip install --system 'requests>=2.32.0'

      - name: Run TV indicator improvement agent
        env:
          ANTHROPIC_API_KEY: "disabled"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          HYPERBOLIC_API_KEY: ${{ secrets.HYPERBOLIC_API_KEY }}
          NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
          NVIDIA_AGENTS_API_KEYS: ${{ secrets.NVIDIA_AGENTS_API_KEYS }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          ALLOW_PAID_APIS: "False"
        run: python .github/scripts/improve_tv_indicators.py

      - name: Validate improved strategies compile
        working-directory: backend
        env:
          PYTHONPATH: "."
          SECRET_KEY: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2"
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"
          ALEMBIC_DATABASE_URL: "sqlite:///./test.db"
          REDIS_URL: ""
          TRADING_MODE: "paper"
          ALPACA_API_KEY: "test"
          ALPACA_SECRET_KEY: "test"
          ALPACA_BASE_URL: "https://paper-api.alpaca.markets"
        run: |
          uv pip install --system \
            'fastapi>=0.115.0' 'sqlalchemy[asyncio]>=2.0.36' 'aiosqlite>=0.19.0' \
            'pydantic[email]>=2.10.0' 'pydantic-settings>=2.6.0' 'email-validator>=2.0.0' \
            'python-jose[cryptography]>=3.3.0' 'passlib[bcrypt]>=1.7.4' \
            'cryptography>=43.0.0' 'bcrypt==4.0.1' \
            'numpy>=1.26.0' 'pandas>=2.2.0' 'scipy>=1.14.0' \
            'scikit-learn>=1.5.0' 'statsmodels>=0.14.0' \
            'structlog>=24.4.0' 'tenacity>=9.0.0' 'python-dotenv>=1.0.1' \
            'torch>=2.4.0' --quiet
          python -c "
          import sys; sys.path.insert(0, '.')
          from app.strategies.manual.tv_indicators import (
              EMAStackStrategy, SqueezeProStrategy, WaveTrendStrategy,
              HullSuiteStrategy, SupertrendRsiComboStrategy, KamaRocStrategy,
              VwapBandsStrategy, IchimokuCloudStrategy, MacdDivergenceStrategy,
              AdxDmiStrategy, StochRsiMacdStrategy, ElliottWaveProxyStrategy,
          )
          print('All 12 TV strategies import OK')
          "
