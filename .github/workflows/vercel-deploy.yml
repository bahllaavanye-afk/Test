name: Vercel Production Deploy (auto)

# Zero-manual-steps production deploys: on every push to main that touches the
# frontend, ping the Vercel Deploy Hook so production rebuilds from main —
# independent of Vercel's "production branch" setting. The hook URL lives in
# Doppler as VERCEL_DEPLOY_HOOK (single-secret pattern via DOPPLER_TOKEN).
# No-ops gracefully until the hook is set, so this never breaks CI.

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "vercel.json"
      - ".github/workflows/vercel-deploy.yml"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install Doppler CLI
        run: (curl -Ls https://cli.doppler.com/install.sh || wget -qO- https://cli.doppler.com/install.sh) | sudo sh

      - name: Trigger Vercel production deploy via hook
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          if [ -z "$DOPPLER_TOKEN" ]; then echo "::warning::DOPPLER_TOKEN not set — skipping"; exit 0; fi
          HOOK=$(doppler secrets get VERCEL_DEPLOY_HOOK --plain 2>/dev/null || true)
          if [ -z "$HOOK" ]; then
            echo "::warning::VERCEL_DEPLOY_HOOK not in Doppler yet — add it once and pushes auto-deploy."
            exit 0
          fi
          code=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$HOOK")
          echo "Vercel deploy hook → HTTP $code"
          [ "$code" -ge 200 ] && [ "$code" -lt 400 ]
