# Root alembic.ini — exists so `alembic upgrade head` works from the repo root.
# Render's dashboard buildCommand runs from /opt/render/project/src.
[alembic]
script_location = backend/alembic
file_template = %%(rev)s_%%(slug)s
prepend_sys_path = backend
truncate_slug_length = 40
revision_environment = false
sourceless = false
version_locations = backend/alembic/versions

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
