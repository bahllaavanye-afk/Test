experiment:
  name: "ensemble_multi_asset_v1"
  model: "ensemble"
  symbols: ["BTC/USDT", "ETH/USDT", "SOL/USDT", "BNB/USDT"]
  exchange: "binance"
  interval: "1h"

data:
  train_start: "2022-01-01"
  train_end: "2023-12-31"
  val_start: "2024-01-01"
  val_end: "2024-06-30"
  test_start: "2024-07-01"
  test_end: "2024-12-31"

features:
  technical: ["rsi_14", "macd", "bb_width", "atr_14", "obv", "vwap_diff", "stoch_k", "williams_r"]
  cross_asset: ["btc_dom", "eth_btc_ratio", "total_volume", "funding_rate", "oi_change_pct"]
  lookback: 60

model_params:
  components:
    lstm:
      weight: 0.35
      hidden_size: 128
      num_layers: 2
      dropout: 0.3
      bidirectional: true
    xgboost:
      weight: 0.30
      max_depth: 5
      n_estimators: 300
      learning_rate: 0.02
    lorentzian_knn:
      weight: 0.20
      k: 8
      lookback: 2000
    ssm:
      weight: 0.15
      d_model: 64
      n_layers: 4
  weight_optimization: "walk_forward_slsqp"
  min_confidence: 0.15
  confidence_threshold: 0.65

training:
  n_walk_forward_splits: 5

strategy:
  name: "ensemble"
  confidence_threshold: 0.65
  position_sizing: "hrp"
  risk_bucket: "directional"

results:
  val_accuracy: null
  val_sharpe: null
  test_sharpe: null
  run_id: null
  trained_at: null
