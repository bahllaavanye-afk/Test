experiment:
  name: "ensemble_multi_asset_v1"
  model: "ensemble"
  symbols: ["BTC/USDT", "ETH/USDT"]
  exchange: "binance"
  interval: "1h"

data:
  train_start: "2022-01-01"
  train_end: "2023-12-31"
  val_start: "2024-01-01"
  val_end: "2024-06-30"
  test_start: "2024-07-01"
  test_end: "2024-12-31"

features:
  technical: ["rsi_14", "macd", "bb_width", "atr_14", "obv", "vwap_diff", "adx_14"]
  cross_asset: ["btc_dom", "eth_btc_ratio", "total_volume", "fear_greed"]
  lookback: 60

ensemble:
  components:
    - model: "lstm"
      weight: 0.40
      params:
        hidden_size: 128
        num_layers: 2
        dropout: 0.3
        bidirectional: true
        attention: true
    - model: "xgboost"
      weight: 0.35
      params:
        max_depth: 6
        n_estimators: 500
        learning_rate: 0.01
        subsample: 0.8
        colsample_bytree: 0.8
    - model: "lorentzian_knn"
      weight: 0.25
      params:
        k: 8
        lookback: 2000
        distance_metric: "lorentzian"
        feature_count: 5
  combination: "weighted_vote"
  calibration: "isotonic"
  meta_learner: "logistic_regression"

training:
  epochs: 100
  batch_size: 256
  lr: 0.001
  optimizer: "adamw"
  scheduler: "cosine"
  early_stopping_patience: 15

strategy:
  name: "ensemble"
  confidence_threshold: 0.68
  position_sizing: "kelly"
  max_position_pct: 0.08
  rebalance_interval: "4h"

results:
  val_accuracy: null
  val_sharpe: null
  test_sharpe: null
  run_id: null
  trained_at: null
  artifact_path: null
