experiment:
  name: "lorentzian_knn_eth_1h_v1"
  model: "lorentzian_knn"
  symbol: "ETH/USDT"
  exchange: "binance"
  interval: "1h"

data:
  train_start: "2022-01-01"
  train_end: "2023-12-31"
  val_start: "2024-01-01"
  val_end: "2024-06-30"
  test_start: "2024-07-01"
  test_end: "2024-12-31"

features:
  technical: ["rsi_14", "cci_20", "adx_14", "ema_diff_10_20", "sma_diff_10_50"]
