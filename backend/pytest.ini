[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    live: end-to-end tests that require reachable live market-data hosts (and, for the
        quote test, real broker credentials). They skip automatically when prerequisites
        are unmet; select them explicitly with `-m live`.
