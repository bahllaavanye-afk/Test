services:
  - type: web
    name: quantedge-api
    env: python
    buildCommand: pip install uv && uv pip install --system -e .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TRADING_MODE
        value: paper
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: quantedge-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
    healthCheckPath: /health
    autoDeploy: true

databases:
  - name: quantedge-db
    plan: free
