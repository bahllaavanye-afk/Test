version: '3.9'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - TRADING_MODE=${TRADING_MODE:-paper}
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/quantedge
      - REDIS_URL=redis://redis:6379
      - DEBUG=true
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
      - ./models_artifacts:/app/models_artifacts
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: quantedge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
