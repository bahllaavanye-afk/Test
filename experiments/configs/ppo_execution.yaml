experiment:
  name: "a3c_lstm_equity_v1"
  model: "a3c_lstm"
  symbol: "SPY"
  exchange: "alpaca"
  interval: "1h"

data:
  train_start: "2021-01-01"
  train_end: "2023-12-31"
  val_start: "2024-01-01"
  val_end: "2024-06-30"

model_params:
  n_features: 27
  hidden_size: 128
  n_actions: 3
  gamma: 0.99

training:
  n_episodes: 2000
  lr: 0.0001
  grad_clip: 0.5
  checkpoint_every: 100

strategy:
  name: "rl_trader"
  confidence_threshold: 0.60
