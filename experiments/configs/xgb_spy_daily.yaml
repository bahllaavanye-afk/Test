experiment:
  name: "xgb_spy_daily_v1"
  model: "xgboost"
  symbol: "SPY"
  exchange: "alpaca"
  interval: "1d"

data:
  train_start: "2018-01-01"
  train_end: "2022-12-31"
  val_start: "2023-01-01"
  val_end: "2023-06-30"
  test_start: "2023-07-01"
  test_end: "2024-12-31"

model_params:
  n_estimators: 500
  max_depth: 6
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8

optuna:
  n_trials: 50
  timeout: 1800

strategy:
  name: "ml_breakout"
  confidence_threshold: 0.65

results:
  val_accuracy: null
  val_sharpe: null
  test_sharpe: null
  run_id: null
  trained_at: null
