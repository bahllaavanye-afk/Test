experiment:
  name: xgb_spy_tech_only
  model: xgboost
  symbol: SPY
  interval: 1d
data:
  train_start: '2015-01-01'
  train_end: '2024-06-30'
  val_start: '2023-01-01'
  val_end: '2024-06-30'
  test_start: '2024-07-01'
  test_end: '2026-01-01'
features:
  technical: true
  advanced: false
  multi_timeframe: false
  lookback: 60
