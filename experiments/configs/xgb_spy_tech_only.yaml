  n_estimators: 500
  max_depth: 6
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  use_gpu: false
training:
  early_stopping_rounds: 50
  eval_metric: auc
ablation_group: xgboost
ablation_var: n_est=500,depth=6,lr=0.05
