databases:
  - name: quantedge-db
    plan: free
    region: oregon
    databaseName: quantedge
    user: quantedge

services:
  - type: web
    name: quantedge-api
    env: python
    region: oregon
    plan: free
    # torch is intentionally NOT installed here: the ~800MB install OOMs the free-tier
    # build container (the cause of the failed deploy). ML strategies degrade gracefully
    # without it; re-add the torch line on a paid plan with a larger build instance.
    buildCommand: cd backend && pip install --upgrade pip && pip install -e "."
    startCommand: bash backend/start.sh
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: TRADING_MODE
        value: paper
      - key: DEBUG
        value: "false"
      - key: ALPACA_BASE_URL
        value: "https://paper-api.alpaca.markets"
      - key: ALLOWED_ORIGINS
        value: "https://quantedge.vercel.app,http://localhost:5173"
      - key: DATABASE_URL
        fromDatabase:
          name: quantedge-db
          property: connectionString
      - key: REDIS_URL
        value: ""
      - key: SECRET_KEY
        generateValue: true
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      # Free-LLM gateway (optional) — agents fall back to the rule engine
      # when these are unset. Paste values in the Render dashboard.
      - key: GROQ_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: "https://quantedge-api-6orc.onrender.com/api/v1/auth/google/callback"
    healthCheckPath: /health
    # Off by default to conserve scarce free-tier pipeline minutes — the autonomous
    # agents push frequently, and every push would otherwise trigger a build. Deploy
    # manually, or let the render-autofix workflow trigger one when needed.
    autoDeploy: false
