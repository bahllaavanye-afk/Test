databases:
  - name: quantedge-db
    plan: free
    region: oregon
    databaseName: quantedge
    user: quantedge

services:
  - type: web
    name: quantedge-api
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: >-
      pip install uv &&
      uv pip install --system
        --extra-index-url https://download.pytorch.org/whl/cpu
        -e ".[test]"
    startCommand: >-
      python -c "
        from alembic.config import Config;
        from alembic import command;
        c = Config('alembic.ini');
        command.upgrade(c, 'head')
      " &&
      uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: TRADING_MODE
        value: paper
      - key: DEBUG
        value: "false"
      - key: ALPACA_BASE_URL
        value: "https://paper-api.alpaca.markets"
      - key: ALLOWED_ORIGINS
        value: "https://quantedge.vercel.app,http://localhost:5173"
      - key: DATABASE_URL
        fromDatabase:
          name: quantedge-db
          property: connectionString
      - key: REDIS_URL
        value: ""         # Optional — leave blank to run without cache
      - key: SECRET_KEY
        generateValue: true
      - key: ALPACA_API_KEY
        sync: false       # Set in Render dashboard (paper trading key)
      - key: ALPACA_SECRET_KEY
        sync: false       # Set in Render dashboard
      - key: SLACK_BOT_TOKEN
        sync: false       # Set in Render dashboard (optional, for notifications)
    healthCheckPath: /health
    autoDeploy: true
