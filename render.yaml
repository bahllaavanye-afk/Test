databases:
  - name: quantedge-db
    plan: free
    region: oregon
    databaseName: quantedge
    user: quantedge

services:
  - type: web
    name: quantedge-api
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install uv && uv pip install --system --extra-index-url https://download.pytorch.org/whl/cpu -e ".[ml]"
    startCommand: bash start.sh
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: TRADING_MODE
        value: paper
      - key: DEBUG
        value: "false"
      - key: ALPACA_BASE_URL
        value: "https://paper-api.alpaca.markets"
      - key: ALLOWED_ORIGINS
        value: "https://quantedge.vercel.app,http://localhost:5173"
      - key: DATABASE_URL
        fromDatabase:
          name: quantedge-db
          property: connectionString
      - key: REDIS_URL
        value: ""
      - key: SECRET_KEY
        generateValue: true
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
    healthCheckPath: /health
    autoDeploy: true
