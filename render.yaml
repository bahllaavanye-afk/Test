services:
  - type: web
    name: quantedge-api
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install uv && uv pip install --system -e . && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: TRADING_MODE
        value: paper
      - key: DEBUG
        value: "false"
      - key: ALPACA_BASE_URL
        value: "https://paper-api.alpaca.markets"
      - key: ALLOWED_ORIGINS
        value: "https://quantedge.vercel.app,http://localhost:5173"
      - key: DATABASE_URL
        sync: false   # Set in Render dashboard: asyncpg Supabase URL
      - key: REDIS_URL
        sync: false   # Set in Render dashboard: rediss://default:<token>@...upstash.io:6379
      - key: SECRET_KEY
        generateValue: true
      - key: ALPACA_API_KEY
        sync: false   # Set in Render dashboard
      - key: ALPACA_SECRET_KEY
        sync: false   # Set in Render dashboard
    healthCheckPath: /health
    autoDeploy: true

