databases:
  - name: quantedge-db
    plan: free
    region: oregon
    databaseName: quantedge
    user: quantedge

services:
  - type: web
    name: quantedge-api
    env: python
    region: oregon
    plan: free
    # Build the Vite SPA (served by the backend via app.static_server — single
    # deployment, no Vercel). Frontend build failure must NOT kill the API deploy,
    # so it's guarded; static_server no-ops when frontend/dist is absent.
    buildCommand: >-
      (cd frontend && npm ci --no-audit --no-fund && npm run build) || echo "frontend build skipped/failed — serving API only" ;
      cd backend && pip install --upgrade pip && pip install -e "."
    startCommand: bash backend/start.sh
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: TRADING_MODE
        value: paper
      - key: DEBUG
        value: "false"
      - key: ALPACA_BASE_URL
        value: "https://paper-api.alpaca.markets"
      - key: ALLOWED_ORIGINS
        value: "https://quantedge.vercel.app,http://localhost:5173"
      - key: DATABASE_URL
        fromDatabase:
          name: quantedge-db
          property: connectionString
      - key: REDIS_URL
        value: ""
      - key: SECRET_KEY
        generateValue: true
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: "https://quantedge-api-agb8.onrender.com/api/v1/auth/google/callback"
    healthCheckPath: /health
    autoDeploy: false
